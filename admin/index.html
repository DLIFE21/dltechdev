<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin DLIFE | Panel avanzado</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, 'SF Pro Text', sans-serif;
      background: #0a0a0c;
      color: #fff;
      padding: 24px;
    }
    /* Glassmorphism premium */
    .glass-card {
      background: rgba(28, 28, 30, 0.6);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      border: 0.5px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .login-box, .admin-container { max-width: 1600px; margin: 0 auto; }
    .login-box { max-width: 420px; margin: 120px auto; padding: 40px; text-align: center; }
    .login-box input, .login-box button { width: 100%; padding: 14px; margin-bottom: 16px; border-radius: 44px; border: none; font-size: 1rem; }
    .login-box input { background: #0f0f10; border: 1px solid #2c2c2e; color: white; }
    .login-box button { background: #0071e3; color: white; cursor: pointer; font-weight: 600; transition: 0.2s; }
    .login-box button:hover { background: #005bb5; transform: scale(0.98); }
    /* Header */
    .admin-header {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; margin-bottom: 32px; gap: 16px;
    }
    .admin-header h1 {
      font-size: 1.8rem; font-weight: 600;
      background: linear-gradient(135deg, #fff, #8e8e93);
      background-clip: text; -webkit-background-clip: text; color: transparent;
    }
    .logout-btn {
      background: #ff453a; border: none; padding: 10px 24px;
      border-radius: 40px; color: white; font-weight: 600;
      cursor: pointer; transition: 0.2s;
    }
    .logout-btn:hover { background: #ff2a1c; transform: scale(0.96); }
    /* Tabs */
    .tabs {
      display: flex; gap: 12px; flex-wrap: wrap;
      border-bottom: 0.5px solid rgba(255,255,255,0.1);
      padding-bottom: 8px; margin-bottom: 28px;
    }
    .tab {
      padding: 10px 20px; border-radius: 40px; cursor: pointer;
      font-weight: 500; transition: 0.2s; color: #aaa;
    }
    .tab.active { background: #0071e3; color: white; }
    .tab:hover { background: rgba(255,255,255,0.1); color: white; }
    /* Tablas */
    .table-wrapper { overflow-x: auto; border-radius: 24px; margin-top: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 14px 12px; text-align: left; border-bottom: 0.5px solid rgba(255,255,255,0.08); }
    th { background: rgba(44,44,46,0.6); color: #aaa; font-weight: 500; }
    button.small {
      background: #0071e3; border: none; padding: 6px 14px;
      border-radius: 30px; color: white; margin-right: 8px;
      cursor: pointer; font-weight: 500; transition: 0.2s;
    }
    button.small:hover { background: #005bb5; transform: scale(0.96); }
    .danger { background: #ff453a; }
    .danger:hover { background: #d63a2e; }
    /* Form modal */
    .form-modal {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center; z-index: 2000;
    }
    .form-card {
      background: #1c1c1e; border-radius: 48px; padding: 32px;
      width: 90%; max-width: 520px; border: 0.5px solid rgba(255,255,255,0.1);
    }
    .form-card input, .form-card select, .form-card textarea {
      width: 100%; padding: 12px; margin-bottom: 16px;
      background: #0f0f10; border: 1px solid #2c2c2e; border-radius: 32px;
      color: white; font-size: 0.95rem;
    }
    /* Gráficas */
    .stats-grid {
      display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 32px;
    }
    .stat-card {
      background: rgba(28,28,30,0.5); backdrop-filter: blur(12px);
      border-radius: 28px; padding: 24px; flex: 1; min-width: 180px;
      text-align: center; border: 0.5px solid rgba(255,255,255,0.05);
    }
    .stat-card h3 { font-size: 0.9rem; font-weight: 500; color: #aaa; margin-bottom: 8px; }
    .stat-card p { font-size: 2rem; font-weight: 700; }
    .chart-controls {
      background: rgba(28,28,30,0.5); backdrop-filter: blur(12px);
      border-radius: 28px; padding: 16px 24px; margin-bottom: 24px;
      display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
      justify-content: space-between;
    }
    .chart-controls select, .chart-controls button {
      background: #0f0f10; border: 1px solid #2c2c2e;
      border-radius: 40px; padding: 10px 20px; color: white;
      cursor: pointer; font-size: 0.9rem;
    }
    .chart-controls button { background: #0071e3; border: none; }
    .chart-container { background: rgba(28,28,30,0.4); border-radius: 32px; padding: 24px; margin-bottom: 32px; }
    canvas { max-height: 380px; width: 100%; }
    .hidden { display: none; }
    .status {
      display: inline-block; padding: 4px 12px; border-radius: 40px;
      font-size: 0.7rem; font-weight: 600; text-transform: capitalize;
    }
    .status.pendiente { background: rgba(255,159,10,0.2); color: #ff9f0a; }
    .status.completada { background: rgba(48,209,88,0.2); color: #30d158; }
  </style>
</head>
<body>
<div id="app">
  <div id="loginContainer" class="login-box glass-card">
    <h2 style="margin-bottom: 24px;">Acceso Administrador</h2>
    <input type="email" id="adminEmail" placeholder="Email">
    <input type="password" id="adminPassword" placeholder="Contraseña">
    <button id="loginButton">Ingresar</button>
  </div>
  <div id="adminContainer" class="admin-container hidden">
    <div class="admin-header">
      <h1><i class="fas fa-chart-line"></i> Panel DLIFE</h1>
      <button id="logoutBtn" class="logout-btn">Cerrar sesión</button>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="productos">📦 Productos</div>
      <div class="tab" data-tab="accesorios">📱 Accesorios</div>
      <div class="tab" data-tab="solicitudes">📋 Solicitudes venta</div>
      <div class="tab" data-tab="ventas_historial">🛒 Historial ventas</div>
      <div class="tab" data-tab="reparaciones">🔧 Reparaciones</div>
      <div class="tab" data-tab="graficas">📊 Gráficas</div>
    </div>
    <div id="productosPanel"></div>
    <div id="accesoriosPanel" class="hidden"></div>
    <div id="solicitudesPanel" class="hidden"></div>
    <div id="ventasHistorialPanel" class="hidden"></div>
    <div id="reparacionesPanel" class="hidden"></div>
    <div id="graficasPanel" class="hidden"></div>
  </div>
</div>
<script>
  // CONFIGURACIÓN SUPABASE
  const adminSupabase = window.supabase.createClient(
    'https://erkethlmokmjoooucbsb.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVya2V0aGxtb2ttam9vb3VjYnNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2OTc2NDAsImV4cCI6MjA5MTI3MzY0MH0.qKKJjpeLP36Oy-wyujknq3ukA7F4JodGBvAEpx74v2M'
  );

  let currentUser = null;
  let productos = [], accesorios = [], reparaciones = [], ventasReales = [], solicitudesVenta = [];
  let activeModal = null;
  let currentChart = null;
  let currentChartType = localStorage.getItem('adminChartType') || 'mensual';

  // Funciones auxiliares
  function showModal(content) { if(activeModal) activeModal.remove(); const modal=document.createElement('div'); modal.className='form-modal'; modal.innerHTML=`<div class="form-card">${content}</div>`; document.body.appendChild(modal); activeModal=modal; modal.addEventListener('click',(e)=>{if(e.target===modal) modal.remove();}); }
  function closeModal() { if(activeModal) activeModal.remove(); activeModal=null; }

  // Autenticación y carga de datos
  async function checkSession() { const {data:{session}}=await adminSupabase.auth.getSession(); if(session){ currentUser=session.user; document.getElementById('loginContainer').classList.add('hidden'); document.getElementById('adminContainer').classList.remove('hidden'); await loadAllData(); } else { document.getElementById('loginContainer').classList.remove('hidden'); document.getElementById('adminContainer').classList.add('hidden'); } }
  async function loadAllData() { await Promise.all([loadProductos(), loadAccesorios(), loadReparaciones(), loadVentasReales(), loadSolicitudesVenta()]); renderProductos(); renderAccesorios(); renderSolicitudes(); renderVentasHistorial(); renderReparaciones(); renderGraficas(); }
  async function loadProductos() { const {data}=await adminSupabase.from('productos').select('*').order('id'); productos=data||[]; }
  async function loadAccesorios() { const {data}=await adminSupabase.from('accesorios').select('*').order('id'); accesorios=data||[]; }
  async function loadReparaciones() { const {data}=await adminSupabase.from('reparaciones').select('*').order('creado_en',{ascending:false}); reparaciones=data||[]; }
  async function loadVentasReales() { const {data}=await adminSupabase.from('ventas_realizadas').select('*').order('fecha',{ascending:false}); ventasReales=data||[]; }
  async function loadSolicitudesVenta() { const {data}=await adminSupabase.from('ventas_contactos').select('*').order('creado_en',{ascending:false}); solicitudesVenta=data||[]; }

  // Renderizado de tablas (productos, accesorios, reparaciones - igual que antes pero con estilos mejorados)
  function renderProductos() {
    const panel=document.getElementById('productosPanel');
    panel.innerHTML=`<div style="margin-bottom:20px;"><button id="addProductoBtn" class="small">+ Agregar Producto</button></div><div class="table-wrapper"><table><thead><tr><th>ID</th><th>Nombre</th><th>Tipo</th><th>Precio</th><th>Stock</th><th>Imagen</th><th>Acciones</th></tr></thead><tbody id="productosBody"></tbody></table></div>`;
    const tbody=document.getElementById('productosBody'); tbody.innerHTML='';
    productos.forEach(p=>{const r=tbody.insertRow(); r.insertCell(0).innerText=p.id; r.insertCell(1).innerText=p.nombre; r.insertCell(2).innerText=p.tipo; r.insertCell(3).innerText=`RD$${p.precio}`; r.insertCell(4).innerText=p.stock; r.insertCell(5).innerHTML=p.imagen_url?`<img src="${p.imagen_url}" width="40">`:'—'; r.insertCell(6).innerHTML=`<button class="small" onclick="editProducto(${p.id})">Editar</button><button class="small danger" onclick="deleteProducto(${p.id})">Eliminar</button>`;});
    document.getElementById('addProductoBtn').onclick=()=>showProductoForm();
  }
  function renderAccesorios() {
    const panel=document.getElementById('accesoriosPanel');
    panel.innerHTML=`<div style="margin-bottom:20px;"><button id="addAccesorioBtn" class="small">+ Agregar Accesorio</button></div><div class="table-wrapper"><table><thead><tr><th>ID</th><th>Nombre</th><th>Precio</th><th>Stock</th><th>Imagen</th><th>Acciones</th></tr></thead><tbody id="accesoriosBody"></tbody></table></div>`;
    const tbody=document.getElementById('accesoriosBody'); tbody.innerHTML='';
    accesorios.forEach(a=>{const r=tbody.insertRow(); r.insertCell(0).innerText=a.id; r.insertCell(1).innerText=a.nombre; r.insertCell(2).innerText=`RD$${a.precio}`; r.insertCell(3).innerText=a.stock; r.insertCell(4).innerHTML=a.imagen_url?`<img src="${a.imagen_url}" width="40">`:'—'; r.insertCell(5).innerHTML=`<button class="small" onclick="editAccesorio(${a.id})">Editar</button><button class="small danger" onclick="deleteAccesorio(${a.id})">Eliminar</button>`;});
    document.getElementById('addAccesorioBtn').onclick=()=>showAccesorioForm();
  }
  function renderSolicitudes() {
    const panel=document.getElementById('solicitudesPanel');
    panel.innerHTML=`<div class="table-wrapper"><table><thead><tr><th>Orden</th><th>Producto</th><th>Cliente</th><th>Teléfono</th><th>Email</th><th>Estado</th><th>Fecha</th><th>Acciones</th></tr></thead><tbody id="solicitudesBody"></tbody></table></div>`;
    const tbody=document.getElementById('solicitudesBody'); tbody.innerHTML='';
    const pendientes = solicitudesVenta.filter(s => s.estado !== 'completada');
    if(pendientes.length===0){ tbody.innerHTML='<tr><td colspan="8">No hay solicitudes pendientes</td></tr>'; return; }
    pendientes.forEach(s=>{const r=tbody.insertRow(); r.insertCell(0).innerText=s.orden||'N/A'; r.insertCell(1).innerText=s.producto; r.insertCell(2).innerText=s.nombre; r.insertCell(3).innerText=s.telefono; r.insertCell(4).innerText=s.email||'—'; r.insertCell(5).innerHTML=`<span class="status ${s.estado||'pendiente'}">${s.estado||'pendiente'}</span>`; r.insertCell(6).innerText=new Date(s.creado_en).toLocaleDateString(); r.insertCell(7).innerHTML=`<button class="small" onclick="confirmarVenta(${s.id}, '${s.producto.replace(/'/g,"\\'")}')">✅ Confirmar</button><button class="small danger" onclick="eliminarSolicitud(${s.id})">🗑️ Eliminar</button>`;});
  }
  function renderVentasHistorial() {
    const panel=document.getElementById('ventasHistorialPanel');
    panel.innerHTML=`<div class="table-wrapper"><table><thead><tr><th>Orden</th><th>Producto</th><th>Cliente</th><th>Teléfono</th><th>Email</th><th>Estado</th><th>Fecha</th></tr></thead><tbody id="historialBody"></tbody></table></div>`;
    const tbody=document.getElementById('historialBody'); tbody.innerHTML='';
    if(solicitudesVenta.length===0){ tbody.innerHTML='<tr><td colspan="7">No hay solicitudes</td></tr>'; return; }
    solicitudesVenta.forEach(s=>{const r=tbody.insertRow(); r.insertCell(0).innerText=s.orden||'N/A'; r.insertCell(1).innerText=s.producto; r.insertCell(2).innerText=s.nombre; r.insertCell(3).innerText=s.telefono; r.insertCell(4).innerText=s.email||'—'; r.insertCell(5).innerHTML=`<span class="status ${s.estado||'pendiente'}">${s.estado||'pendiente'}</span>`; r.insertCell(6).innerText=new Date(s.creado_en).toLocaleDateString();});
  }
  function renderReparaciones() {
    const panel=document.getElementById('reparacionesPanel');
    panel.innerHTML=`<div class="table-wrapper"><table><thead><tr><th>ID</th><th>Orden</th><th>Cliente</th><th>Dispositivo</th><th>Problema</th><th>Estado</th><th>Fecha</th><th>Acciones</th></tr></thead><tbody id="reparacionesBody"></tbody></table></div>`;
    const tbody=document.getElementById('reparacionesBody'); tbody.innerHTML='';
    reparaciones.forEach(r=>{const row=tbody.insertRow(); row.insertCell(0).innerText=r.id; row.insertCell(1).innerText=r.orden||'N/A'; row.insertCell(2).innerText=r.nombre; row.insertCell(3).innerText=`${r.dispositivo||''} ${r.modelo||''}`; row.insertCell(4).innerText=(r.problema||'').substring(0,40); row.insertCell(5).innerHTML=`<span class="status ${r.estado}">${r.estado}</span>`; row.insertCell(6).innerText=new Date(r.creado_en).toLocaleDateString(); row.insertCell(7).innerHTML=`<button class="small" onclick="cambiarEstadoRep(${r.id},'completado')">Completar</button><button class="small danger" onclick="eliminarRep(${r.id})">Eliminar</button>`;});
  }

  // GRÁFICAS AVANZADAS
  async function renderGraficas() {
    const panel = document.getElementById('graficasPanel');
    // Calcular estadísticas básicas
    const totalVentas = ventasReales.length;
    const ingresosTotales = ventasReales.reduce((s,v)=>s+(v.total||0),0);
    const productosUnicos = new Set(ventasReales.map(v=>v.nombre_item)).size;
    // Panel de controles
    panel.innerHTML = `
      <div class="stats-grid">
        <div class="stat-card"><h3>Total Ventas</h3><p>${totalVentas}</p></div>
        <div class="stat-card"><h3>Ingresos Totales</h3><p>RD$${ingresosTotales.toLocaleString()}</p></div>
        <div class="stat-card"><h3>Productos Vendidos</h3><p>${productosUnicos}</p></div>
      </div>
      <div class="chart-controls">
        <select id="chartTypeSelect">
          <option value="mensual" ${currentChartType==='mensual'?'selected':''}>📅 Ventas mensuales</option>
          <option value="diario" ${currentChartType==='diario'?'selected':''}>📈 Tendencia diaria (últimos 30 días)</option>
          <option value="top" ${currentChartType==='top'?'selected':''}>🏆 Top productos más vendidos</option>
          <option value="rotacion" ${currentChartType==='rotacion'?'selected':''}>⚠️ Productos con baja rotación</option>
          <option value="region" ${currentChartType==='region'?'selected':''}>🌎 Ventas por región</option>
        </select>
        <button id="refreshChartBtn">Actualizar gráfica</button>
      </div>
      <div class="chart-container"><canvas id="mainChart"></canvas></div>
    `;
    // Cargar gráfica según tipo guardado
    await loadChart(currentChartType);
    // Eventos
    document.getElementById('chartTypeSelect').addEventListener('change', async (e) => {
      currentChartType = e.target.value;
      localStorage.setItem('adminChartType', currentChartType);
      await loadChart(currentChartType);
    });
    document.getElementById('refreshChartBtn').addEventListener('click', async () => {
      await loadChart(currentChartType);
    });
  }

  async function loadChart(type) {
    if (currentChart) currentChart.destroy();
    const ctx = document.getElementById('mainChart').getContext('2d');
    let labels = [], datos = [], titulo = '', tipoGrafica = 'bar';

    if (type === 'mensual') {
      // Ventas por mes (últimos 6 meses)
      const hoy = new Date();
      const meses = [];
      const ventasPorMes = [];
      for(let i=5; i>=0; i--) {
        const d = new Date(hoy.getFullYear(), hoy.getMonth()-i, 1);
        meses.push(d.toLocaleString('es', {month:'short', year:'numeric'}));
        ventasPorMes.push(0);
      }
      ventasReales.forEach(v => {
        const fecha = new Date(v.fecha);
        const diff = (hoy.getFullYear()-fecha.getFullYear())*12 + (hoy.getMonth()-fecha.getMonth());
        if (diff>=0 && diff<6) ventasPorMes[5-diff] += v.total || 0;
      });
      labels = meses;
      datos = ventasPorMes;
      titulo = 'Ingresos por mes (RD$)';
      tipoGrafica = 'bar';
    }
    else if (type === 'diario') {
      // Tendencia diaria últimos 30 días
      const hoy = new Date();
      const dias = [];
      const ventasDiarias = [];
      for(let i=29; i>=0; i--) {
        const d = new Date(hoy);
        d.setDate(hoy.getDate() - i);
        dias.push(d.toLocaleDateString('es'));
        ventasDiarias.push(0);
      }
      ventasReales.forEach(v => {
        const fecha = new Date(v.fecha);
        const diffDias = Math.floor((hoy - fecha) / (1000*60*60*24));
        if (diffDias >=0 && diffDias < 30) ventasDiarias[29-diffDias] += v.total || 0;
      });
      labels = dias;
      datos = ventasDiarias;
      titulo = 'Ingresos diarios (últimos 30 días)';
      tipoGrafica = 'line';
    }
    else if (type === 'top') {
      // Top 10 productos más vendidos (por cantidad)
      const prodCount = {};
      ventasReales.forEach(v => {
        const nombre = v.nombre_item || (v.producto_id ? productos.find(p=>p.id===v.producto_id)?.nombre : 'Desconocido');
        if (nombre) prodCount[nombre] = (prodCount[nombre]||0) + (v.cantidad||1);
      });
      const top = Object.entries(prodCount).sort((a,b)=>b[1]-a[1]).slice(0,10);
      labels = top.map(t=>t[0]);
      datos = top.map(t=>t[1]);
      titulo = 'Unidades vendidas por producto';
      tipoGrafica = 'bar';
    }
    else if (type === 'rotacion') {
      // Productos con baja rotación (menos de 2 ventas en total)
      const prodCount = {};
      ventasReales.forEach(v => {
        const nombre = v.nombre_item || (v.producto_id ? productos.find(p=>p.id===v.producto_id)?.nombre : 'Desconocido');
        if (nombre) prodCount[nombre] = (prodCount[nombre]||0) + (v.cantidad||1);
      });
      const bajaRotacion = Object.entries(prodCount).filter(([_, cant]) => cant <= 2).sort((a,b)=>a[1]-b[1]);
      labels = bajaRotacion.map(t=>t[0]);
      datos = bajaRotacion.map(t=>t[1]);
      titulo = 'Productos con baja rotación (≤2 ventas)';
      tipoGrafica = 'bar';
      if (labels.length === 0) {
        document.getElementById('mainChart').style.display = 'none';
        document.getElementById('graficasPanel').innerHTML += '<div class="chart-container">Todos los productos tienen buena rotación 🎉</div>';
        return;
      } else {
        document.getElementById('mainChart').style.display = 'block';
      }
    }
    else if (type === 'region') {
      // Ventas por región (desde ventas_contactos)
      const regionCount = {};
      solicitudesVenta.forEach(s => {
        if (s.region && s.estado === 'completada') {
          regionCount[s.region] = (regionCount[s.region]||0) + 1;
        }
      });
      labels = Object.keys(regionCount);
      datos = Object.values(regionCount);
      titulo = 'Cantidad de ventas completadas por región';
      tipoGrafica = 'bar';
      if (labels.length === 0) {
        document.getElementById('mainChart').style.display = 'none';
        document.getElementById('graficasPanel').innerHTML += '<div class="chart-container">Aún no hay ventas completadas por región</div>';
        return;
      } else {
        document.getElementById('mainChart').style.display = 'block';
      }
    }

    currentChart = new Chart(ctx, {
      type: tipoGrafica,
      data: { labels, datasets: [{ label: titulo, data: datos, backgroundColor: '#0071e3', borderColor: '#30d158', borderWidth: 1 }] },
      options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: 'white' } } } }
    });
  }

  // CRUD productos (igual que antes)
  window.editProducto=async(id)=>{const p=productos.find(p=>p.id===id); showProductoForm(p);};
  async function showProductoForm(prod=null){
    const isEdit=!!prod;
    const html=`<h2>${isEdit?'Editar':'Nuevo'} Producto</h2><input id="prodNombre" placeholder="Nombre" value="${prod?.nombre||''}"><input id="prodTipo" placeholder="Tipo" value="${prod?.tipo||''}"><input id="prodPrecio" type="number" placeholder="Precio RD$" value="${prod?.precio||''}"><input id="prodStock" type="number" placeholder="Stock" value="${prod?.stock||''}"><input id="prodImagen" placeholder="URL de imagen" value="${prod?.imagen_url||''}"><input type="file" id="prodImagenFile" accept="image/*"><button id="saveProductoBtn">Guardar</button>`;
    showModal(html);
    document.getElementById('saveProductoBtn').onclick=async()=>{
      const nombre=document.getElementById('prodNombre').value;
      const tipo=document.getElementById('prodTipo').value;
      const precio=parseInt(document.getElementById('prodPrecio').value);
      const stock=parseInt(document.getElementById('prodStock').value);
      let imagen_url=document.getElementById('prodImagen').value;
      const file=document.getElementById('prodImagenFile').files[0];
      if(file){
        const ext=file.name.split('.').pop();
        const fileName=`${Date.now()}.${ext}`;
        const {error}=await adminSupabase.storage.from('productos').upload(fileName,file);
        if(!error) imagen_url=adminSupabase.storage.from('productos').getPublicUrl(fileName).data.publicUrl;
      }
      if(isEdit) await adminSupabase.from('productos').update({nombre,tipo,precio,stock,imagen_url}).eq('id',prod.id);
      else await adminSupabase.from('productos').insert([{nombre,tipo,precio,stock,imagen_url}]);
      closeModal(); await loadAllData();
    };
  }
  window.deleteProducto=async(id)=>{if(confirm('¿Eliminar producto?')){await adminSupabase.from('productos').delete().eq('id',id); await loadAllData();}};
  window.editAccesorio=async(id)=>{const a=accesorios.find(a=>a.id===id); showAccesorioForm(a);};
  async function showAccesorioForm(acc=null){
    const isEdit=!!acc;
    const html=`<h2>${isEdit?'Editar':'Nuevo'} Accesorio</h2><input id="accNombre" placeholder="Nombre" value="${acc?.nombre||''}"><input id="accPrecio" type="number" placeholder="Precio RD$" value="${acc?.precio||''}"><input id="accStock" type="number" placeholder="Stock" value="${acc?.stock||''}"><input id="accImagen" placeholder="URL de imagen" value="${acc?.imagen_url||''}"><input type="file" id="accImagenFile" accept="image/*"><button id="saveAccesorioBtn">Guardar</button>`;
    showModal(html);
    document.getElementById('saveAccesorioBtn').onclick=async()=>{
      const nombre=document.getElementById('accNombre').value;
      const precio=parseInt(document.getElementById('accPrecio').value);
      const stock=parseInt(document.getElementById('accStock').value);
      let imagen_url=document.getElementById('accImagen').value;
      const file=document.getElementById('accImagenFile').files[0];
      if(file){
        const ext=file.name.split('.').pop();
        const fileName=`${Date.now()}.${ext}`;
        const {error}=await adminSupabase.storage.from('accesorios').upload(fileName,file);
        if(!error) imagen_url=adminSupabase.storage.from('accesorios').getPublicUrl(fileName).data.publicUrl;
      }
      if(isEdit) await adminSupabase.from('accesorios').update({nombre,precio,stock,imagen_url}).eq('id',acc.id);
      else await adminSupabase.from('accesorios').insert([{nombre,precio,stock,imagen_url}]);
      closeModal(); await loadAllData();
    };
  }
  window.deleteAccesorio=async(id)=>{if(confirm('¿Eliminar accesorio?')){await adminSupabase.from('accesorios').delete().eq('id',id); await loadAllData();}};

  // Confirmar venta (actualiza stock y ventas_realizadas)
  window.confirmarVenta = async (idSolicitud, nombreProducto) => {
    let producto = productos.find(p => p.nombre === nombreProducto);
    let tipo = 'producto';
    if (!producto) { producto = accesorios.find(a => a.nombre === nombreProducto); tipo = 'accesorio'; }
    if (!producto) { alert('Producto no encontrado'); return; }
    if (producto.stock <= 0) { alert(`Stock insuficiente de ${producto.nombre}`); return; }
    if (!confirm(`¿Confirmar venta de ${producto.nombre}? Se descontará 1 unidad.`)) return;
    const nuevoStock = producto.stock - 1;
    if (tipo === 'producto') await adminSupabase.from('productos').update({ stock: nuevoStock }).eq('id', producto.id);
    else await adminSupabase.from('accesorios').update({ stock: nuevoStock }).eq('id', producto.id);
    await adminSupabase.from('ventas_realizadas').insert([{
      producto_id: tipo === 'producto' ? producto.id : null,
      nombre_item: producto.nombre,
      tipo_item: tipo,
      cantidad: 1,
      total: producto.precio,
      fecha: new Date()
    }]);
    await adminSupabase.from('ventas_contactos').update({ estado: 'completada' }).eq('id', idSolicitud);
    alert('✅ Venta confirmada. Stock actualizado y venta registrada.');
    await loadAllData();
  };
  window.eliminarSolicitud = async (idSolicitud) => {
    if (!confirm('¿Eliminar esta solicitud?')) return;
    await adminSupabase.from('ventas_contactos').delete().eq('id', idSolicitud);
    await loadAllData();
  };
  window.cambiarEstadoRep=async(id,estado)=>{await adminSupabase.from('reparaciones').update({estado}).eq('id',id); await loadAllData();};
  window.eliminarRep=async(id)=>{if(confirm('¿Eliminar solicitud?')){await adminSupabase.from('reparaciones').delete().eq('id',id); await loadAllData();}};

  // Tabs
  function switchTab(tabId){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
    const panels = ['productosPanel','accesoriosPanel','solicitudesPanel','ventasHistorialPanel','reparacionesPanel','graficasPanel'];
    panels.forEach(pid => document.getElementById(pid).classList.add('hidden'));
    document.getElementById(`${tabId}Panel`).classList.remove('hidden');
    if(tabId==='graficas') renderGraficas();
  }
  document.querySelectorAll('.tab').forEach(tab=>tab.addEventListener('click',()=>switchTab(tab.dataset.tab)));

  // Login / Logout
  document.getElementById('loginButton').onclick=async()=>{
    const email=document.getElementById('adminEmail').value, pwd=document.getElementById('adminPassword').value;
    const {error}=await adminSupabase.auth.signInWithPassword({email,password:pwd});
    if(error) alert('Error: '+error.message);
    else checkSession();
  };
  document.getElementById('logoutBtn').onclick=async()=>{await adminSupabase.auth.signOut(); checkSession();};
  checkSession();
</script>
</body>
</html>
