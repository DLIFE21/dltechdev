<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin DLIFE | Panel completo</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, 'SF Pro Text', sans-serif; background: #0a0a0c; color: #fff; padding: 20px; }
    .login-container, .admin-container { max-width: 1400px; margin: 0 auto; }
    .login-box { max-width: 400px; margin: 100px auto; background: #1c1c1e; border-radius: 32px; padding: 32px; text-align: center; }
    .login-box input, .login-box button { width: 100%; padding: 14px; margin-bottom: 16px; border-radius: 28px; border: none; }
    .login-box input { background: #0f0f10; color: white; }
    .login-box button { background: #0071e3; color: white; cursor: pointer; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; }
    .logout-btn { background: #ff453a; padding: 8px 20px; border-radius: 30px; border: none; color: white; cursor: pointer; }
    .tabs { display: flex; gap: 16px; margin-bottom: 24px; border-bottom: 1px solid #2c2c2e; flex-wrap: wrap; }
    .tab { padding: 10px 20px; cursor: pointer; border-radius: 30px 30px 0 0; }
    .tab.active { background: #0071e3; }
    .table-wrapper { overflow-x: auto; background: #0f0f10; border-radius: 20px; margin-top: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 0.5px solid #2c2c2e; }
    th { background: #1c1c1e; color: #aaa; }
    button.small { background: #0071e3; border: none; padding: 6px 12px; border-radius: 20px; color: white; margin-right: 8px; cursor: pointer; }
    .danger { background: #ff453a; }
    .form-modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; z-index:1000; }
    .form-card { background:#1c1c1e; border-radius:32px; padding:24px; width:90%; max-width:500px; }
    .form-card input, .form-card select, .form-card textarea { width:100%; padding:10px; margin-bottom:16px; background:#0f0f10; border:1px solid #2c2c2e; border-radius:20px; color:white; }
    .hidden { display: none; }
    .stats-grid { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 30px; }
    .stat-card { background: #1c1c1e; border-radius: 24px; padding: 20px; flex: 1; min-width: 150px; text-align: center; }
    .chart-container { background: #1c1c1e; border-radius: 24px; padding: 20px; margin-bottom: 30px; }
    canvas { max-height: 300px; }
    .status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; text-transform: capitalize; }
    .status.pendiente { background: #ff9f0a; color: #000; }
    .status.completada, .status.completado { background: #30d158; color: #000; }
    .empty-row { text-align: center; padding: 20px; color: #aaa; }
  </style>
</head>
<body>
<div id="app">
  <div id="loginContainer" class="login-box">
    <h2>Acceso Administrador</h2>
    <input type="email" id="adminEmail" placeholder="Email">
    <input type="password" id="adminPassword" placeholder="Contraseña">
    <button id="loginButton">Ingresar</button>
  </div>
  <div id="adminContainer" class="admin-container hidden">
    <div class="admin-header">
      <h1>Panel de Control DLIFE</h1>
      <button id="logoutBtn" class="logout-btn">Cerrar sesión</button>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="productos">📦 Productos</div>
      <div class="tab" data-tab="accesorios">📱 Accesorios</div>
      <div class="tab" data-tab="solicitudes">📋 Solicitudes venta</div>
      <div class="tab" data-tab="ventas_historial">🛒 Historial ventas</div>
      <div class="tab" data-tab="reparaciones">🔧 Reparaciones</div>
      <div class="tab" data-tab="graficas">📊 Gráficas</div>
    </div>
    <div id="productosPanel"></div>
    <div id="accesoriosPanel" class="hidden"></div>
    <div id="solicitudesPanel" class="hidden"></div>
    <div id="ventasHistorialPanel" class="hidden"></div>
    <div id="reparacionesPanel" class="hidden"></div>
    <div id="graficasPanel" class="hidden"></div>
  </div>
</div>
<script>
  const adminSupabase = window.supabase.createClient(
    'https://erkethlmokmjoooucbsb.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVya2V0aGxtb2ttam9vb3VjYnNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2OTc2NDAsImV4cCI6MjA5MTI3MzY0MH0.qKKJjpeLP36Oy-wyujknq3ukA7F4JodGBvAEpx74v2M'
  );

  let currentUser = null;
  let productos = [], accesorios = [], reparaciones = [], ventasReales = [], solicitudesVenta = [];
  let activeModal = null;

  function showModal(content) { if(activeModal) activeModal.remove(); const modal=document.createElement('div'); modal.className='form-modal'; modal.innerHTML=`<div class="form-card">${content}</div>`; document.body.appendChild(modal); activeModal=modal; modal.addEventListener('click',(e)=>{if(e.target===modal) modal.remove();}); }
  function closeModal() { if(activeModal) activeModal.remove(); activeModal=null; }

  async function checkSession() { const {data:{session}}=await adminSupabase.auth.getSession(); if(session){ currentUser=session.user; document.getElementById('loginContainer').classList.add('hidden'); document.getElementById('adminContainer').classList.remove('hidden'); await loadAllData(); } else { document.getElementById('loginContainer').classList.remove('hidden'); document.getElementById('adminContainer').classList.add('hidden'); } }
  async function loadAllData() { 
    console.log("Cargando todos los datos...");
    await Promise.all([loadProductos(), loadAccesorios(), loadReparaciones(), loadVentasReales(), loadSolicitudesVenta()]); 
    renderProductos(); 
    renderAccesorios(); 
    renderSolicitudes(); 
    renderVentasHistorial(); 
    renderReparaciones(); 
    renderGraficas(); 
  }
  async function loadProductos() { const {data, error}=await adminSupabase.from('productos').select('*').order('id'); if(error) console.error("Error productos:", error); productos=data||[]; console.log("Productos cargados:", productos.length); }
  async function loadAccesorios() { const {data, error}=await adminSupabase.from('accesorios').select('*').order('id'); if(error) console.error("Error accesorios:", error); accesorios=data||[]; console.log("Accesorios cargados:", accesorios.length); }
  async function loadReparaciones() { const {data}=await adminSupabase.from('reparaciones').select('*').order('creado_en',{ascending:false}); reparaciones=data||[]; }
  async function loadVentasReales() { const {data}=await adminSupabase.from('ventas_realizadas').select('*').order('fecha',{ascending:false}); ventasReales=data||[]; console.log("Ventas reales cargadas:", ventasReales.length); }
  async function loadSolicitudesVenta() { const {data}=await adminSupabase.from('ventas_contactos').select('*').order('creado_en',{ascending:false}); solicitudesVenta=data||[]; console.log("Solicitudes de venta cargadas:", solicitudesVenta.length); }

  function renderProductos() {
    const panel=document.getElementById('productosPanel');
    if(!panel) return;
    panel.innerHTML=`<div style="margin-bottom:20px;"><button id="addProductoBtn" class="small">+ Agregar Producto</button></div><div class="table-wrapper"><table><thead><tr><th>ID</th><th>Nombre</th><th>Tipo</th><th>Precio</th><th>Stock</th><th>Imagen</th><th>Acciones</th></tr></thead><tbody id="productosBody"></tbody></table></div>`;
    const tbody=document.getElementById('productosBody');
    if(!tbody) return;
    tbody.innerHTML='';
    if(productos.length===0){ tbody.innerHTML='<tr><td colspan="7" class="empty-row">No hay productos registrados</td></tr>'; return; }
    productos.forEach(p=>{const r=tbody.insertRow(); r.insertCell(0).innerText=p.id; r.insertCell(1).innerText=p.nombre; r.insertCell(2).innerText=p.tipo; r.insertCell(3).innerText=`RD$${p.precio}`; r.insertCell(4).innerText=p.stock; r.insertCell(5).innerHTML=p.imagen_url?`<img src="${p.imagen_url}" width="40">`:'—'; r.insertCell(6).innerHTML=`<button class="small" onclick="editProducto(${p.id})">Editar</button><button class="small danger" onclick="deleteProducto(${p.id})">Eliminar</button>`;});
    const addBtn=document.getElementById('addProductoBtn');
    if(addBtn) addBtn.onclick=()=>showProductoForm();
  }

  function renderAccesorios() {
    const panel=document.getElementById('accesoriosPanel');
    if(!panel) return;
    panel.innerHTML=`<div style="margin-bottom:20px;"><button id="addAccesorioBtn" class="small">+ Agregar Accesorio</button></div><div class="table-wrapper"></td><thead><tr><th>ID</th><th>Nombre</th><th>Precio</th><th>Stock</th><th>Imagen</th><th>Acciones</th></tr></thead><tbody id="accesoriosBody"></tbody></table></div>`;
    const tbody=document.getElementById('accesoriosBody');
    if(!tbody) return;
    tbody.innerHTML='';
    console.log("Renderizando accesorios, cantidad:", accesorios.length);
    if(accesorios.length===0){ tbody.innerHTML='<tr><td colspan="6" class="empty-row">No hay accesorios registrados</td></tr>'; return; }
    accesorios.forEach(a=>{const r=tbody.insertRow(); r.insertCell(0).innerText=a.id; r.insertCell(1).innerText=a.nombre; r.insertCell(2).innerText=`RD$${a.precio}`; r.insertCell(3).innerText=a.stock; r.insertCell(4).innerHTML=a.imagen_url?`<img src="${a.imagen_url}" width="40">`:'—'; r.insertCell(5).innerHTML=`<button class="small" onclick="editAccesorio(${a.id})">Editar</button><button class="small danger" onclick="deleteAccesorio(${a.id})">Eliminar</button>`;});
    const addBtn=document.getElementById('addAccesorioBtn');
    if(addBtn) addBtn.onclick=()=>showAccesorioForm();
  }

  function renderSolicitudes() {
    const panel = document.getElementById('solicitudesPanel');
    if(!panel) return;
    panel.innerHTML = `<div class="table-wrapper"><table id="solicitudesTable"><thead><tr><th>Orden</th><th>Producto</th><th>Cliente</th><th>Teléfono</th><th>Email</th><th>Fecha</th><th>Acciones</th></tr></thead><tbody id="solicitudesBody"></tbody></table></div>`;
    const tbody = document.getElementById('solicitudesBody');
    if(!tbody) return;
    tbody.innerHTML='';
    const pendientes = solicitudesVenta.filter(s => s.estado !== 'completada');
    if (pendientes.length === 0) { tbody.innerHTML = '<tr><td colspan="7" class="empty-row">No hay solicitudes pendientes</td></tr>'; return; }
    pendientes.forEach(s => {
      const row = tbody.insertRow();
      row.insertCell(0).innerText = s.orden || 'N/A';
      row.insertCell(1).innerText = s.producto;
      row.insertCell(2).innerText = s.nombre;
      row.insertCell(3).innerText = s.telefono;
      row.insertCell(4).innerText = s.email;
      row.insertCell(5).innerText = new Date(s.creado_en).toLocaleDateString();
      const actions = row.insertCell(6);
      actions.innerHTML = `
        <button class="small" onclick="confirmarVenta(${s.id}, '${s.producto.replace(/'/g, "\\'")}')">✅ Confirmar venta</button>
        <button class="small danger" onclick="eliminarSolicitud(${s.id})">🗑️ Eliminar</button>
      `;
    });
  }

  function renderVentasHistorial() {
    const panel = document.getElementById('ventasHistorialPanel');
    if(!panel) return;
    panel.innerHTML = `<div class="table-wrapper"><table id="historialTable"><thead><tr><th>Orden</th><th>Producto</th><th>Cliente</th><th>Teléfono</th><th>Email</th><th>Estado</th><th>Fecha</th></tr></thead><tbody id="historialBody"></tbody></table></div>`;
    const tbody = document.getElementById('historialBody');
    if(!tbody) return;
    tbody.innerHTML='';
    if (solicitudesVenta.length === 0) { tbody.innerHTML = '<tr><td colspan="7" class="empty-row">No hay solicitudes de venta</td></tr>'; return; }
    solicitudesVenta.forEach(s => {
      const row = tbody.insertRow();
      row.insertCell(0).innerText = s.orden || 'N/A';
      row.insertCell(1).innerText = s.producto;
      row.insertCell(2).innerText = s.nombre;
      row.insertCell(3).innerText = s.telefono;
      row.insertCell(4).innerText = s.email;
      row.insertCell(5).innerHTML = `<span class="status ${s.estado || 'pendiente'}">${s.estado || 'pendiente'}</span>`;
      row.insertCell(6).innerText = new Date(s.creado_en).toLocaleDateString();
    });
  }

  function renderReparaciones() {
    const panel=document.getElementById('reparacionesPanel');
    if(!panel) return;
    panel.innerHTML=`<div class="table-wrapper"><table><thead><tr><th>ID</th><th>Orden</th><th>Cliente</th><th>Dispositivo</th><th>Problema</th><th>Estado</th><th>Fecha</th><th>Acciones</th></tr></thead><tbody id="reparacionesBody"></tbody></table></div>`;
    const tbody=document.getElementById('reparacionesBody');
    if(!tbody) return;
    tbody.innerHTML='';
    if(reparaciones.length===0){ tbody.innerHTML='<tr><td colspan="8" class="empty-row">No hay reparaciones registradas</td></tr>'; return; }
    reparaciones.forEach(r=>{const row=tbody.insertRow(); row.insertCell(0).innerText=r.id; row.insertCell(1).innerText=r.orden||'N/A'; row.insertCell(2).innerText=r.nombre; row.insertCell(3).innerText=`${r.dispositivo||''} ${r.modelo||''}`; row.insertCell(4).innerText=(r.problema||'').substring(0,30); row.insertCell(5).innerHTML=`<span class="status ${r.estado}">${r.estado}</span>`; row.insertCell(6).innerText=new Date(r.creado_en).toLocaleDateString(); row.insertCell(7).innerHTML=`<button class="small" onclick="cambiarEstadoRep(${r.id},'completado')">Completar</button><button class="small danger" onclick="eliminarRep(${r.id})">Eliminar</button>`;});
  }

  async function renderGraficas() {
    const panel=document.getElementById('graficasPanel');
    if(!panel) return;
    console.log("Renderizando gráficas con ventasReales:", ventasReales.length);
    const totalVentas=ventasReales.length;
    const ingresosTotales=ventasReales.reduce((s,v)=>s+(v.total||0),0);
    const hoy=new Date(); const meses=[]; const ventasPorMes=[];
    for(let i=5;i>=0;i--){const d=new Date(hoy.getFullYear(),hoy.getMonth()-i,1); meses.push(d.toLocaleString('es',{month:'short',year:'numeric'})); ventasPorMes.push(0);}
    ventasReales.forEach(v=>{const fecha=new Date(v.fecha); const diff=(hoy.getFullYear()-fecha.getFullYear())*12+(hoy.getMonth()-fecha.getMonth()); if(diff>=0&&diff<6) ventasPorMes[5-diff]+=v.total||0;});
    const prodCount={};
    ventasReales.forEach(v=>{const nombre=v.nombre_item||(v.producto_id?productos.find(p=>p.id===v.producto_id)?.nombre:'Desconocido'); if(nombre) prodCount[nombre]=(prodCount[nombre]||0)+(v.cantidad||1);});
    const topProductos=Object.entries(prodCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
    panel.innerHTML=`<div class="stats-grid"><div class="stat-card"><h3>Total Ventas</h3><p>${totalVentas}</p></div><div class="stat-card"><h3>Ingresos Totales</h3><p>RD$${ingresosTotales.toLocaleString()}</p></div></div><div class="chart-container"><canvas id="ventasMensualChart"></canvas></div><div class="chart-container"><canvas id="topProductosChart"></canvas></div>`;
    new Chart(document.getElementById('ventasMensualChart'),{type:'bar',data:{labels:meses,datasets:[{label:'Ingresos (RD$)',data:ventasPorMes,backgroundColor:'#0071e3'}]}});
    new Chart(document.getElementById('topProductosChart'),{type:'bar',data:{labels:topProductos.map(t=>t[0]),datasets:[{label:'Unidades vendidas',data:topProductos.map(t=>t[1]),backgroundColor:'#30d158'}]}});
  }

  // CRUD Productos
  window.editProducto=async(id)=>{const p=productos.find(p=>p.id===id); showProductoForm(p);};
  async function showProductoForm(prod=null){
    const isEdit=!!prod;
    const html=`<h2>${isEdit?'Editar':'Nuevo'} Producto</h2><input id="prodNombre" placeholder="Nombre" value="${prod?.nombre||''}"><input id="prodTipo" placeholder="Tipo (iPhone, MacBook...)" value="${prod?.tipo||''}"><input id="prodPrecio" type="number" placeholder="Precio RD$" value="${prod?.precio||''}"><input id="prodStock" type="number" placeholder="Stock" value="${prod?.stock||''}"><input id="prodImagen" placeholder="URL de imagen" value="${prod?.imagen_url||''}"><input type="file" id="prodImagenFile" accept="image/*"><button id="saveProductoBtn">Guardar</button>`;
    showModal(html);
    const btn=document.getElementById('saveProductoBtn');
    if(btn) btn.onclick=async()=>{
      const nombre=document.getElementById('prodNombre')?.value;
      const tipo=document.getElementById('prodTipo')?.value;
      const precio=parseInt(document.getElementById('prodPrecio')?.value);
      const stock=parseInt(document.getElementById('prodStock')?.value);
      let imagen_url=document.getElementById('prodImagen')?.value;
      const file=document.getElementById('prodImagenFile')?.files[0];
      if(file){
        const ext=file.name.split('.').pop();
        const fileName=`${Date.now()}.${ext}`;
        const {error}=await adminSupabase.storage.from('productos').upload(fileName,file);
        if(!error) imagen_url=adminSupabase.storage.from('productos').getPublicUrl(fileName).data.publicUrl;
      }
      if(isEdit) await adminSupabase.from('productos').update({nombre,tipo,precio,stock,imagen_url}).eq('id',prod.id);
      else await adminSupabase.from('productos').insert([{nombre,tipo,precio,stock,imagen_url}]);
      closeModal(); await loadAllData();
    };
  }
  window.deleteProducto=async(id)=>{if(confirm('¿Eliminar producto?')){await adminSupabase.from('productos').delete().eq('id',id); await loadAllData();}};

  // CRUD Accesorios
  window.editAccesorio=async(id)=>{const a=accesorios.find(a=>a.id===id); showAccesorioForm(a);};
  async function showAccesorioForm(acc=null){
    const isEdit=!!acc;
    const html=`<h2>${isEdit?'Editar':'Nuevo'} Accesorio</h2><input id="accNombre" placeholder="Nombre" value="${acc?.nombre||''}"><input id="accPrecio" type="number" placeholder="Precio RD$" value="${acc?.precio||''}"><input id="accStock" type="number" placeholder="Stock" value="${acc?.stock||''}"><input id="accImagen" placeholder="URL de imagen" value="${acc?.imagen_url||''}"><input type="file" id="accImagenFile" accept="image/*"><button id="saveAccesorioBtn">Guardar</button>`;
    showModal(html);
    const btn=document.getElementById('saveAccesorioBtn');
    if(btn) btn.onclick=async()=>{
      const nombre=document.getElementById('accNombre')?.value;
      const precio=parseInt(document.getElementById('accPrecio')?.value);
      const stock=parseInt(document.getElementById('accStock')?.value);
      let imagen_url=document.getElementById('accImagen')?.value;
      const file=document.getElementById('accImagenFile')?.files[0];
      if(file){
        const ext=file.name.split('.').pop();
        const fileName=`${Date.now()}.${ext}`;
        const {error}=await adminSupabase.storage.from('accesorios').upload(fileName,file);
        if(!error) imagen_url=adminSupabase.storage.from('accesorios').getPublicUrl(fileName).data.publicUrl;
      }
      if(isEdit) await adminSupabase.from('accesorios').update({nombre,precio,stock,imagen_url}).eq('id',acc.id);
      else await adminSupabase.from('accesorios').insert([{nombre,precio,stock,imagen_url}]);
      closeModal(); await loadAllData();
    };
  }
  window.deleteAccesorio=async(id)=>{if(confirm('¿Eliminar accesorio?')){await adminSupabase.from('accesorios').delete().eq('id',id); await loadAllData();}};

  // Confirmar venta
  window.confirmarVenta = async (idSolicitud, nombreProducto) => {
    console.log("Confirmando venta ID:", idSolicitud, "Producto:", nombreProducto);
    
    let producto = productos.find(p => p.nombre === nombreProducto);
    let tipo = 'producto';
    if (!producto) {
      producto = accesorios.find(a => a.nombre === nombreProducto);
      tipo = 'accesorio';
    }
    if (!producto) { alert('Producto no encontrado'); return; }
    if (producto.stock <= 0) { alert(`Stock insuficiente de ${producto.nombre}`); return; }
    if (!confirm(`¿Confirmar venta de ${producto.nombre}? Se descontará 1 unidad.`)) return;

    const nuevoStock = producto.stock - 1;
    // Actualizar stock
    if (tipo === 'producto') {
      const { error } = await adminSupabase.from('productos').update({ stock: nuevoStock }).eq('id', producto.id);
      if (error) { console.error("Error al actualizar stock:", error); alert("Error al actualizar stock"); return; }
    } else {
      const { error } = await adminSupabase.from('accesorios').update({ stock: nuevoStock }).eq('id', producto.id);
      if (error) { console.error("Error al actualizar stock:", error); alert("Error al actualizar stock"); return; }
    }

    // Registrar venta real
    const { data: ventaData, error: ventaError } = await adminSupabase.from('ventas_realizadas').insert([{
      producto_id: tipo === 'producto' ? producto.id : null,
      nombre_item: producto.nombre,
      tipo_item: tipo,
      cantidad: 1,
      total: producto.precio,
      fecha: new Date()
    }]).select();
    
    if (ventaError) {
      console.error("Error al insertar en ventas_realizadas:", ventaError);
      alert("Error al registrar la venta: " + ventaError.message);
      return;
    }
    console.log("Venta registrada en ventas_realizadas:", ventaData);

    // Marcar solicitud como completada
    const { error: updateError } = await adminSupabase.from('ventas_contactos').update({ estado: 'completada' }).eq('id', idSolicitud);
    if (updateError) {
      console.error("Error al actualizar solicitud:", updateError);
      alert("Error al actualizar la solicitud");
      return;
    }

    alert('✅ Venta confirmada. Stock actualizado y venta registrada.');
    await loadAllData();
  };

  // Eliminar solicitud
  window.eliminarSolicitud = async (idSolicitud) => {
    if (!confirm('¿Eliminar esta solicitud permanentemente? Esta acción no afecta el stock.')) return;
    const { error } = await adminSupabase.from('ventas_contactos').delete().eq('id', idSolicitud);
    if (error) {
      console.error("Error al eliminar solicitud:", error);
      alert("Error al eliminar solicitud: " + error.message);
    } else {
      alert("Solicitud eliminada correctamente.");
      await loadAllData();
    }
  };

  // Reparaciones
  window.cambiarEstadoRep=async(id,estado)=>{await adminSupabase.from('reparaciones').update({estado}).eq('id',id); await loadAllData();};
  window.eliminarRep=async(id)=>{if(confirm('¿Eliminar solicitud?')){await adminSupabase.from('reparaciones').delete().eq('id',id); await loadAllData();}};

  // Tabs
  function switchTab(tabId){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    const activeTab = document.querySelector(`.tab[data-tab="${tabId}"]`);
    if(activeTab) activeTab.classList.add('active');
    const panels = ['productosPanel', 'accesoriosPanel', 'solicitudesPanel', 'ventasHistorialPanel', 'reparacionesPanel', 'graficasPanel'];
    panels.forEach(pid => {
      const el = document.getElementById(pid);
      if(el) el.classList.add('hidden');
    });
    const currentPanel = document.getElementById(`${tabId}Panel`);
    if(currentPanel) currentPanel.classList.remove('hidden');
    if(tabId==='graficas') renderGraficas();
    // Forzar recarga de datos al cambiar a accesorios por si acaso
    if(tabId==='accesorios' && accesorios.length===0) loadAllData();
  }
  document.querySelectorAll('.tab').forEach(tab=>tab.addEventListener('click',()=>switchTab(tab.dataset.tab)));

  // Login / Logout
  document.getElementById('loginButton').onclick=async()=>{
    const email=document.getElementById('adminEmail').value, pwd=document.getElementById('adminPassword').value;
    const {error}=await adminSupabase.auth.signInWithPassword({email,password:pwd});
    if(error) alert('Error: '+error.message);
    else checkSession();
  };
  document.getElementById('logoutBtn').onclick=async()=>{await adminSupabase.auth.signOut(); checkSession();};
  checkSession();
</script>
</body>
</html>
