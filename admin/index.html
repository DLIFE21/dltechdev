<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin DLIFE | Panel definitivo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #0a0a0c; color: #fff; padding: 24px; }
    .glass-card { background: rgba(28,28,30,0.6); backdrop-filter: blur(20px); border-radius: 32px; border: 0.5px solid rgba(255,255,255,0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    .login-box, .admin-container { max-width: 1600px; margin: 0 auto; }
    .login-box { max-width: 420px; margin: 120px auto; padding: 40px; text-align: center; }
    .login-box input, .login-box button { width: 100%; padding: 14px; margin-bottom: 16px; border-radius: 44px; border: none; font-size: 1rem; }
    .login-box input { background: #0f0f10; border: 1px solid #2c2c2e; color: white; }
    .login-box button { background: #0071e3; color: white; cursor: pointer; font-weight: 600; transition: 0.2s; }
    .login-box button:hover { background: #005bb5; transform: scale(0.98); }
    .admin-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 32px; gap: 16px; }
    .admin-header h1 { font-size: 1.8rem; font-weight: 600; background: linear-gradient(135deg, #fff, #8e8e93); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .logout-btn { background: #ff453a; border: none; padding: 10px 24px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .logout-btn:hover { background: #ff2a1c; transform: scale(0.96); }
    .tabs { display: flex; gap: 12px; flex-wrap: wrap; border-bottom: 0.5px solid rgba(255,255,255,0.1); padding-bottom: 8px; margin-bottom: 28px; }
    .tab { padding: 10px 20px; border-radius: 40px; cursor: pointer; font-weight: 500; transition: 0.2s; color: #aaa; }
    .tab.active { background: #0071e3; color: white; }
    .tab:hover { background: rgba(255,255,255,0.1); color: white; }
    .table-wrapper { overflow-x: auto; border-radius: 24px; margin-top: 20px; background: rgba(0,0,0,0.2); }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 14px 12px; text-align: left; border-bottom: 0.5px solid rgba(255,255,255,0.08); }
    th { background: rgba(44,44,46,0.6); color: #aaa; font-weight: 500; }
    button.small { background: #0071e3; border: none; padding: 6px 14px; border-radius: 30px; color: white; margin-right: 8px; cursor: pointer; font-weight: 500; transition: 0.2s; }
    button.small:hover { background: #005bb5; transform: scale(0.96); }
    .danger { background: #ff453a; }
    .danger:hover { background: #d63a2e; }
    .form-modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; z-index: 2000; }
    .form-card { background: #1c1c1e; border-radius: 48px; padding: 32px; width: 90%; max-width: 520px; border: 0.5px solid rgba(255,255,255,0.1); }
    .form-card input, .form-card select, .form-card textarea { width: 100%; padding: 12px; margin-bottom: 16px; background: #0f0f10; border: 1px solid #2c2c2e; border-radius: 32px; color: white; font-size: 0.95rem; }
    .stats-grid { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 32px; }
    .stat-card { background: rgba(28,28,30,0.5); backdrop-filter: blur(12px); border-radius: 28px; padding: 24px; flex: 1; min-width: 180px; text-align: center; border: 0.5px solid rgba(255,255,255,0.05); }
    .stat-card h3 { font-size: 0.9rem; font-weight: 500; color: #aaa; margin-bottom: 8px; }
    .stat-card p { font-size: 2rem; font-weight: 700; }
    .chart-controls { background: rgba(28,28,30,0.5); backdrop-filter: blur(12px); border-radius: 28px; padding: 16px 24px; margin-bottom: 24px; display: flex; flex-wrap: wrap; gap: 16px; align-items: center; justify-content: space-between; }
    .chart-controls select, .chart-controls button { background: #0f0f10; border: 1px solid #2c2c2e; border-radius: 40px; padding: 10px 20px; color: white; cursor: pointer; font-size: 0.9rem; }
    .chart-controls button { background: #0071e3; border: none; }
    .chart-container { background: rgba(28,28,30,0.4); border-radius: 32px; padding: 24px; margin-bottom: 32px; }
    canvas { max-height: 420px; width: 100%; }
    .hidden { display: none; }
    .status { display: inline-block; padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; text-transform: capitalize; }
    .status.pendiente { background: rgba(255,159,10,0.2); color: #ff9f0a; }
    .status.completada { background: rgba(48,209,88,0.2); color: #30d158; }
    .status.completado { background: rgba(48,209,88,0.2); color: #30d158; }
    .status.en_progreso { background: rgba(94,92,230,0.2); color: #5e5ce6; }
    .status.cancelado { background: rgba(255,69,58,0.2); color: #ff453a; }
    .empty-message { text-align: center; padding: 30px; color: #aaa; font-style: italic; }

    /* ===== Añadidos en esta revisión ===== */
    .panel-toolbar { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; align-items: center; }
    .search-input { background: #0f0f10; border: 1px solid #2c2c2e; border-radius: 40px; padding: 10px 18px; color: white; font-size: 0.9rem; min-width: 240px; flex: 1; max-width: 360px; }
    .status-select { background: #0f0f10; color: white; border: 1px solid #2c2c2e; border-radius: 30px; padding: 6px 10px; font-size: 0.78rem; text-transform: capitalize; cursor: pointer; }
    .toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 10px; z-index: 3000; max-width: 320px; }
    .toast { padding: 14px 18px; border-radius: 16px; background: #1c1c1e; border: 0.5px solid rgba(255,255,255,0.12); box-shadow: 0 8px 24px rgba(0,0,0,0.35); font-size: 0.88rem; animation: toastIn .25s ease; }
    .toast.success { border-left: 4px solid #30d158; }
    .toast.error { border-left: 4px solid #ff453a; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .client-row-summary { font-size: 0.78rem; color: #aaa; }
    .purchase-list { max-height: 320px; overflow-y: auto; text-align: left; margin-top: 8px; }
    .purchase-list div { padding: 8px 0; border-bottom: 0.5px solid rgba(255,255,255,0.08); font-size: 0.85rem; }
  </style>
</head>
<body>
<div id="app">
  <div id="loginContainer" class="login-box glass-card">
    <h2 style="margin-bottom: 24px;">Acceso Administrador</h2>
    <input type="email" id="adminEmail" placeholder="Email">
    <input type="password" id="adminPassword" placeholder="Contraseña">
    <button id="loginButton">Ingresar</button>
  </div>
  <div id="adminContainer" class="admin-container hidden">
    <div class="admin-header">
      <h1><i class="fas fa-chart-line"></i> Panel DLIFE</h1>
      <button id="logoutBtn" class="logout-btn">Cerrar sesión</button>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="productos">📦 Productos</div>
      <div class="tab" data-tab="accesorios">📱 Accesorios</div>
      <div class="tab" data-tab="solicitudes">📋 Solicitudes venta</div>
      <div class="tab" data-tab="clientes">👥 Historial clientes</div>
      <div class="tab" data-tab="reparaciones">🔧 Reparaciones</div>
      <div class="tab" data-tab="graficas">📊 Gráficas</div>
    </div>
    <div id="productosPanel"></div>
    <div id="accesoriosPanel" class="hidden"></div>
    <div id="solicitudesPanel" class="hidden"></div>
    <div id="clientesPanel" class="hidden"></div>
    <div id="reparacionesPanel" class="hidden"></div>
    <div id="graficasPanel" class="hidden"></div>
  </div>
</div>
<script>
  /* =================================================================
     RESUMEN DE CAMBIOS EN ESTA REVISIÓN (léelo si vuelves en 6 meses):
     1. "Historial ventas" -> "Historial clientes": agrupa las solicitudes
        completadas (ventas_contactos) por cliente, con detalle de compras.
     2. Seguridad: escapeHtml ahora también escapa comillas (evita XSS en
        atributos), se eliminaron los onclick="fn(${valor})" inline y se
        usa delegación de eventos con data-id/data-action.
        ADMIN_EMAILS es un candado de UI extra, NO sustituye RLS (ver nota
        más abajo, junto a la creación del cliente de Supabase).
     3. Manejo de errores: cada llamada a Supabase revisa `error` y avisa
        con un toast en vez de fallar en silencio.
     4. UX: alert()/confirm() nativos reemplazados por toasts y un modal
        de confirmación propio. Búsqueda en productos/accesorios/
        reparaciones/solicitudes/clientes. Tras una acción solo se
        recargan los datos afectados, no las 5 tablas completas.
     5. CRUD de productos/accesorios unificado en showEntityForm() para
        no duplicar el formulario dos veces.
     6. Reparaciones: estado pasó de un solo botón "Completar" a un
        select con pendiente/en_progreso/completado/cancelado.
     7. Borra la imagen anterior del Storage cuando se reemplaza por una
        nueva (antes quedaban archivos huérfanos).
     ================================================================= */

  const adminSupabase = window.supabase.createClient(
    'https://erkethlmokmjoooucbsb.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVya2V0aGxtb2ttam9vb3VjYnNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2OTc2NDAsImV4cCI6MjA5MTI3MzY0MH0.qKKJjpeLP36Oy-wyujknq3ukA7F4JodGBvAEpx74v2M'
  );

  // 👉 Capa adicional de UX: si la dejas vacía, no bloquea a nadie (no rompe
  // tu acceso actual). Si la rellenas, cualquier sesión con un correo que
  // no esté en la lista se cierra automáticamente al detectarla.
  // IMPORTANTE: esto NO es seguridad real. La anon key de arriba es pública
  // (cualquiera que vea el código fuente la tiene). Si las tablas no tienen
  // Row Level Security activado en el dashboard de Supabase, cualquiera
  // puede leer/escribir en ellas directo vía la API REST sin pasar por este
  // login. Esa parte solo se arregla con políticas RLS en Supabase, no desde
  // este archivo.
  const ADMIN_EMAILS = [
    // 'tu-correo@dlife.com',
  ];

  let currentUser = null;
  let productos = [], accesorios = [], reparaciones = [], ventasReales = [], solicitudesVenta = [];
  let activeModal = null;
  let currentChart = null;
  let currentChartType = localStorage.getItem('adminChartType') || 'mensual';
  let currentChartStyle = localStorage.getItem('adminChartStyle') || 'bar';

  // ================= UTILIDADES =================
  function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str).replace(/[&<>"']/g, (m) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[m]));
  }

  function formatCurrency(n) {
    return 'RD$' + Number(n || 0).toLocaleString('es-DO');
  }

  function matches(text, query) {
    return String(text || '').toLowerCase().includes(String(query || '').toLowerCase());
  }

  function showToast(message, type = 'success', duration = 3500) {
    let container = document.getElementById('toastContainer');
    if (!container) {
      container = document.createElement('div');
      container.id = 'toastContainer';
      container.className = 'toast-container';
      document.body.appendChild(container);
    }
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), duration);
  }

  function showModal(content) {
    if (activeModal) activeModal.remove();
    const modal = document.createElement('div');
    modal.className = 'form-modal';
    modal.innerHTML = `<div class="form-card">${content}</div>`;
    document.body.appendChild(modal);
    activeModal = modal;
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
  }
  function closeModal() { if (activeModal) activeModal.remove(); activeModal = null; }

  function showConfirm(message, onConfirm, confirmText = 'Confirmar') {
    const html = `
      <h2 style="margin-bottom:20px; font-size:1.1rem;">${escapeHtml(message)}</h2>
      <div style="display:flex; gap:12px;">
        <button id="confirmYesBtn" class="small" style="flex:1;">${escapeHtml(confirmText)}</button>
        <button id="confirmNoBtn" class="small danger" style="flex:1;">Cancelar</button>
      </div>`;
    showModal(html);
    document.getElementById('confirmYesBtn').onclick = () => { closeModal(); onConfirm(); };
    document.getElementById('confirmNoBtn').onclick = () => closeModal();
  }

  function getStoragePathFromUrl(url, bucket) {
    if (!url) return null;
    const marker = `/storage/v1/object/public/${bucket}/`;
    const idx = url.indexOf(marker);
    if (idx === -1) return null;
    return url.substring(idx + marker.length);
  }

  async function uploadImage(file, bucket, oldUrl) {
    const ext = file.name.split('.').pop();
    const fileName = `${Date.now()}.${ext}`;
    const { error } = await adminSupabase.storage.from(bucket).upload(fileName, file);
    if (error) { showToast('Error subiendo imagen: ' + error.message, 'error'); return null; }
    if (oldUrl) {
      const oldPath = getStoragePathFromUrl(oldUrl, bucket);
      if (oldPath) adminSupabase.storage.from(bucket).remove([oldPath]).catch(() => {});
    }
    return adminSupabase.storage.from(bucket).getPublicUrl(fileName).data.publicUrl;
  }

  // ================= SESIÓN =================
  async function checkSession() {
    const { data: { session } } = await adminSupabase.auth.getSession();
    if (session && ADMIN_EMAILS.length && !ADMIN_EMAILS.includes(session.user.email)) {
      await adminSupabase.auth.signOut();
      showToast('Este usuario no tiene acceso al panel.', 'error');
      document.getElementById('loginContainer').classList.remove('hidden');
      document.getElementById('adminContainer').classList.add('hidden');
      return;
    }
    if (session) {
      currentUser = session.user;
      document.getElementById('loginContainer').classList.add('hidden');
      document.getElementById('adminContainer').classList.remove('hidden');
      await loadAllData();
    } else {
      document.getElementById('loginContainer').classList.remove('hidden');
      document.getElementById('adminContainer').classList.add('hidden');
    }
  }

  // ================= CARGA DE DATOS =================
  async function fetchTable(table, orderBy, ascending = true) {
    const { data, error } = await adminSupabase.from(table).select('*').order(orderBy, { ascending });
    if (error) {
      console.error(`Error cargando ${table}:`, error);
      showToast(`Error cargando ${table}: ${error.message}`, 'error');
      return [];
    }
    return data || [];
  }
  async function loadProductos() { productos = await fetchTable('productos', 'id'); }
  async function loadAccesorios() { accesorios = await fetchTable('accesorios', 'id'); }
  async function loadReparaciones() { reparaciones = await fetchTable('reparaciones', 'creado_en', false); }
  async function loadVentasReales() { ventasReales = await fetchTable('ventas_realizadas', 'fecha', false); }
  async function loadSolicitudesVenta() { solicitudesVenta = await fetchTable('ventas_contactos', 'creado_en', false); }

  const LOADERS = { productos: loadProductos, accesorios: loadAccesorios, reparaciones: loadReparaciones, ventasReales: loadVentasReales, solicitudesVenta: loadSolicitudesVenta };

  // Recarga solo lo necesario y vuelve a pintar solo los paneles afectados,
  // en vez de releer las 5 tablas tras cada clic.
  async function refresh(keys) {
    await Promise.all(keys.map(k => LOADERS[k] ? LOADERS[k]() : Promise.resolve()));
    if (keys.includes('productos')) renderProductos();
    if (keys.includes('accesorios')) renderAccesorios();
    if (keys.includes('reparaciones')) renderReparaciones();
    if (keys.includes('solicitudesVenta')) { renderSolicitudes(); renderClientes(); }
    const graficasVisible = !document.getElementById('graficasPanel').classList.contains('hidden');
    if (graficasVisible && (keys.includes('ventasReales') || keys.includes('solicitudesVenta') || keys.includes('productos') || keys.includes('accesorios'))) {
      renderGraficas();
    }
  }

  async function loadAllData() {
    await Promise.all(Object.values(LOADERS).map(fn => fn()));
    renderProductos();
    renderAccesorios();
    renderSolicitudes();
    renderClientes();
    renderReparaciones();
    renderGraficas();
  }

  // ================= PRODUCTOS =================
  function renderProductos() {
    const panel = document.getElementById('productosPanel');
    if (!panel) return;
    panel.innerHTML = `
      <div class="panel-toolbar">
        <button id="addProductoBtn" class="small">+ Agregar Producto</button>
        <input type="text" id="productosSearch" class="search-input" placeholder="🔍 Buscar producto...">
      </div>
      <div id="productosTableContainer"></div>`;
    document.getElementById('addProductoBtn').onclick = () => showProductoForm();
    document.getElementById('productosSearch').addEventListener('input', (e) => renderProductosTable(e.target.value));
    renderProductosTable('');
  }

  function renderProductosTable(query = '') {
    const container = document.getElementById('productosTableContainer');
    if (!container) return;
    const filtrados = productos.filter(p => !query || matches(p.nombre, query) || matches(p.tipo, query));
    if (filtrados.length === 0) {
      container.innerHTML = `<div class="empty-message">${productos.length === 0 ? 'No hay productos registrados' : 'Sin resultados para tu búsqueda'}</div>`;
      return;
    }
    let html = `<div class="table-wrapper"><table><thead><tr><th>ID</th><th>Nombre</th><th>Tipo</th><th>Precio</th><th>Stock</th><th>Imagen</th><th>Acciones</th></tr></thead><tbody>`;
    filtrados.forEach(p => {
      html += `<tr data-id="${p.id}">
        <td>${p.id}</td>
        <td>${escapeHtml(p.nombre)}</td>
        <td>${escapeHtml(p.tipo)}</td>
        <td>${formatCurrency(p.precio)}</td>
        <td>${p.stock}</td>
        <td>${p.imagen_url ? `<img src="${escapeHtml(p.imagen_url)}" width="40">` : '—'}</td>
        <td><button class="small" data-action="edit">Editar</button><button class="small danger" data-action="delete">Eliminar</button></td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
    container.innerHTML = html;
    container.querySelector('table').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-action]');
      if (!btn) return;
      const id = Number(btn.closest('tr').dataset.id);
      if (btn.dataset.action === 'edit') editProducto(id);
      if (btn.dataset.action === 'delete') deleteProducto(id);
    });
  }

  // ================= ACCESORIOS =================
  function renderAccesorios() {
    const panel = document.getElementById('accesoriosPanel');
    if (!panel) return;
    panel.innerHTML = `
      <div class="panel-toolbar">
        <button id="addAccesorioBtn" class="small">+ Agregar Accesorio</button>
        <input type="text" id="accesoriosSearch" class="search-input" placeholder="🔍 Buscar accesorio...">
      </div>
      <div id="accesoriosTableContainer"></div>`;
    document.getElementById('addAccesorioBtn').onclick = () => showAccesorioForm();
    document.getElementById('accesoriosSearch').addEventListener('input', (e) => renderAccesoriosTable(e.target.value));
    renderAccesoriosTable('');
  }

  function renderAccesoriosTable(query = '') {
    const container = document.getElementById('accesoriosTableContainer');
    if (!container) return;
    const filtrados = accesorios.filter(a => !query || matches(a.nombre, query));
    if (filtrados.length === 0) {
      container.innerHTML = `<div class="empty-message">${accesorios.length === 0 ? 'No hay accesorios registrados' : 'Sin resultados para tu búsqueda'}</div>`;
      return;
    }
    let html = `<div class="table-wrapper"><table><thead><tr><th>ID</th><th>Nombre</th><th>Precio</th><th>Stock</th><th>Imagen</th><th>Acciones</th></tr></thead><tbody>`;
    filtrados.forEach(a => {
      html += `<tr data-id="${a.id}">
        <td>${a.id}</td>
        <td>${escapeHtml(a.nombre)}</td>
        <td>${formatCurrency(a.precio)}</td>
        <td>${a.stock}</td>
        <td>${a.imagen_url ? `<img src="${escapeHtml(a.imagen_url)}" width="40">` : '—'}</td>
        <td><button class="small" data-action="edit">Editar</button><button class="small danger" data-action="delete">Eliminar</button></td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
    container.innerHTML = html;
    container.querySelector('table').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-action]');
      if (!btn) return;
      const id = Number(btn.closest('tr').dataset.id);
      if (btn.dataset.action === 'edit') editAccesorio(id);
      if (btn.dataset.action === 'delete') deleteAccesorio(id);
    });
  }

  // ================= FORMULARIO GENÉRICO PRODUCTO/ACCESORIO =================
  const PRODUCTO_FORM = {
    table: 'productos', bucket: 'productos',
    titleNew: 'Nuevo Producto', titleEdit: 'Editar Producto',
    fields: [
      { key: 'nombre', label: 'Nombre', type: 'text', required: true },
      { key: 'tipo', label: 'Tipo', type: 'text' },
      { key: 'precio', label: 'Precio RD$', type: 'number', required: true },
      { key: 'stock', label: 'Stock', type: 'number', required: true },
    ],
    afterSave: () => refresh(['productos'])
  };
  const ACCESORIO_FORM = {
    table: 'accesorios', bucket: 'accesorios',
    titleNew: 'Nuevo Accesorio', titleEdit: 'Editar Accesorio',
    fields: [
      { key: 'nombre', label: 'Nombre', type: 'text', required: true },
      { key: 'precio', label: 'Precio RD$', type: 'number', required: true },
      { key: 'stock', label: 'Stock', type: 'number', required: true },
    ],
    afterSave: () => refresh(['accesorios'])
  };

  function showProductoForm(prod = null) { showEntityForm(PRODUCTO_FORM, prod); }
  function showAccesorioForm(acc = null) { showEntityForm(ACCESORIO_FORM, acc); }

  function showEntityForm(config, item = null) {
    const isEdit = !!item;
    const inputsHtml = config.fields.map(f => {
      const val = item ? (item[f.key] ?? '') : '';
      return `<input id="field_${f.key}" type="${f.type}" placeholder="${escapeHtml(f.label)}" value="${escapeHtml(val)}">`;
    }).join('');
    const html = `
      <h2 style="margin-bottom:16px;">${isEdit ? config.titleEdit : config.titleNew}</h2>
      ${inputsHtml}

      <input type="file" id="field_imagen_file" accept="image/*">
      <button id="saveEntityBtn">Guardar</button>`;
    showModal(html);
    document.getElementById('saveEntityBtn').onclick = async () => {
      const payload = {};
      for (const f of config.fields) {
        const raw = document.getElementById(`field_${f.key}`).value.trim();
        if (f.type === 'number') {
          const num = Number(raw);
          if (f.required && (raw === '' || isNaN(num))) {
            showToast(`"${f.label}" debe ser un número válido.`, 'error');
            return;
          }
          payload[f.key] = raw === '' ? null : num;
        } else {
          if (f.required && raw === '') {
            showToast(`"${f.label}" es obligatorio.`, 'error');
            return;
          }
          payload[f.key] = raw;
        }
      }
      let imagen_url = document.getElementById('field_imagen_url').value.trim();
      const file = document.getElementById('field_imagen_file').files[0];
      if (file) {
        const uploaded = await uploadImage(file, config.bucket, item?.imagen_url);
        if (uploaded) imagen_url = uploaded;
      }
      payload.imagen_url = imagen_url;

      const query = isEdit
        ? adminSupabase.from(config.table).update(payload).eq('id', item.id)
        : adminSupabase.from(config.table).insert([payload]);
      const { error } = await query;
      if (error) { showToast('Error guardando: ' + error.message, 'error'); return; }
      closeModal();
      showToast(isEdit ? 'Actualizado correctamente.' : 'Agregado correctamente.', 'success');
      await config.afterSave();
    };
  }

  function confirmarVenta(idSolicitud) {
    const solicitud = solicitudesVenta.find(s => s.id === idSolicitud);
    if (!solicitud) { showToast('Solicitud no encontrada.', 'error'); return; }
    let producto = productos.find(p => p.nombre === solicitud.producto);
    let tipo = 'producto';
    if (!producto) { producto = accesorios.find(a => a.nombre === solicitud.producto); tipo = 'accesorio'; }
    if (!producto) { showToast('Producto no encontrado en el catálogo.', 'error'); return; }
    if (producto.stock <= 0) { showToast(`Stock insuficiente de ${producto.nombre}`, 'error'); return; }

    showConfirm(`¿Confirmar venta de ${producto.nombre}? Se descontará 1 unidad de stock.`, async () => {
      const nuevoStock = producto.stock - 1;
      const tableStock = tipo === 'producto' ? 'productos' : 'accesorios';
      const { error: stockError } = await adminSupabase.from(tableStock).update({ stock: nuevoStock }).eq('id', producto.id);
      if (stockError) { showToast('Error actualizando stock: ' + stockError.message, 'error'); return; }

      const { error: ventaError } = await adminSupabase.from('ventas_realizadas').insert([{
        producto_id: tipo === 'producto' ? producto.id : null,
        nombre_item: producto.nombre,
        tipo_item: tipo,
        cantidad: 1,
        total: producto.precio,
        fecha: new Date()
      }]);
      if (ventaError) showToast('Venta registrada con advertencias: ' + ventaError.message, 'error');

      const { error: estadoError } = await adminSupabase.from('ventas_contactos').update({ estado: 'completada' }).eq('id', idSolicitud);
      if (estadoError) { showToast('Error actualizando la solicitud: ' + estadoError.message, 'error'); return; }

      showToast('Venta confirmada. Stock actualizado.', 'success');
      await refresh(['productos', 'accesorios', 'ventasReales', 'solicitudesVenta']);
    }, 'Confirmar venta');
  }

  // ================= HISTORIAL DE CLIENTES (antes "Historial ventas") =================
  // Agrupa las solicitudes ya completadas por cliente (clave: teléfono, si no
  // hay, email, si no hay, nombre). El total gastado es estimado con el
  // precio actual del catálogo, porque ventas_contactos no guarda el precio
  // al momento de la venta. Si más adelante quieres totales históricos
  // exactos, lo ideal es guardar el precio en ventas_contactos al confirmar.
  function agruparClientes() {
    const completadas = solicitudesVenta.filter(s => s.estado === 'completada');
    const grupos = new Map();
    completadas.forEach(s => {
      const key = (s.telefono || s.email || s.nombre || 'desconocido').toString().trim().toLowerCase();
      if (!grupos.has(key)) {
        grupos.set(key, { nombre: s.nombre, telefono: s.telefono, email: s.email, compras: [], totalGastado: 0, ultimaCompra: s.creado_en });
      }
      const cliente = grupos.get(key);
      const item = productos.find(p => p.nombre === s.producto) || accesorios.find(a => a.nombre === s.producto);
      const precio = item ? Number(item.precio) || 0 : 0;
      cliente.compras.push({ producto: s.producto, orden: s.orden, fecha: s.creado_en, precio });
      cliente.totalGastado += precio;
      if (new Date(s.creado_en) > new Date(cliente.ultimaCompra)) {
        cliente.ultimaCompra = s.creado_en;
        cliente.nombre = s.nombre; cliente.telefono = s.telefono; cliente.email = s.email;
      }
    });
    return Array.from(grupos.values()).sort((a, b) => new Date(b.ultimaCompra) - new Date(a.ultimaCompra));
  }

  async function loadChart(type, style) {
    if (currentChart) currentChart.destroy();
    const canvas = document.getElementById('mainChart');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let labels = [], data = [], titulo = '';
    let isPieOrDoughnut = (style === 'pie' || style === 'doughnut');

    if (type === 'mensual') {
      const hoy = new Date(); const meses = []; const valores = [];
      for (let i = 5; i >= 0; i--) { const d = new Date(hoy.getFullYear(), hoy.getMonth() - i, 1); meses.push(d.toLocaleString('es', { month: 'short', year: 'numeric' })); valores.push(0); }
      ventasReales.forEach(v => { const fecha = new Date(v.fecha); const diff = (hoy.getFullYear() - fecha.getFullYear()) * 12 + (hoy.getMonth() - fecha.getMonth()); if (diff >= 0 && diff < 6) valores[5 - diff] += v.total || 0; });
      labels = meses; data = valores; titulo = 'Ingresos por mes (RD$)';
    }
    else if (type === 'diario') {
      const hoy = new Date(); const dias = []; const valores = [];
      for (let i = 29; i >= 0; i--) { const d = new Date(hoy); d.setDate(hoy.getDate() - i); dias.push(d.toLocaleDateString('es')); valores.push(0); }
      ventasReales.forEach(v => { const fecha = new Date(v.fecha); const diffDias = Math.floor((hoy - fecha) / (1000 * 60 * 60 * 24)); if (diffDias >= 0 && diffDias < 30) valores[29 - diffDias] += v.total || 0; });
      labels = dias; data = valores; titulo = 'Ingresos diarios (últimos 30 días)';
    }
    else if (type === 'top') {
      const prodCount = {};
      ventasReales.forEach(v => { const nombre = v.nombre_item || (v.producto_id ? productos.find(p => p.id === v.producto_id)?.nombre : 'Desconocido'); if (nombre) prodCount[nombre] = (prodCount[nombre] || 0) + (v.cantidad || 1); });
      const top = Object.entries(prodCount).sort((a, b) => b[1] - a[1]).slice(0, 10);
      labels = top.map(t => t[0]); data = top.map(t => t[1]); titulo = 'Unidades vendidas por producto';
    }
    else if (type === 'rotacion') {
      const prodCount = {};
      ventasReales.forEach(v => { const nombre = v.nombre_item || (v.producto_id ? productos.find(p => p.id === v.producto_id)?.nombre : 'Desconocido'); if (nombre) prodCount[nombre] = (prodCount[nombre] || 0) + (v.cantidad || 1); });
      const baja = Object.entries(prodCount).filter(([_, cant]) => cant <= 2);
      labels = baja.map(t => t[0]); data = baja.map(t => t[1]); titulo = 'Productos con ≤2 ventas';
      if (labels.length === 0) { canvas.style.display = 'none'; showToast('No hay productos con baja rotación.', 'error'); return; }
      else canvas.style.display = 'block';
    }
    else if (type === 'region') {
      const regionCount = {};
      solicitudesVenta.forEach(s => { if (s.region && s.estado === 'completada') regionCount[s.region] = (regionCount[s.region] || 0) + 1; });
      labels = Object.keys(regionCount); data = Object.values(regionCount); titulo = 'Ventas completadas por región';
      if (labels.length === 0) { canvas.style.display = 'none'; showToast('No hay datos de región todavía.', 'error'); return; }
      else canvas.style.display = 'block';
    }
    else if (type === 'clientes') {
      const top = agruparClientes().sort((a, b) => b.compras.length - a.compras.length).slice(0, 10);
      labels = top.map(c => c.nombre); data = top.map(c => c.compras.length); titulo = 'Compras confirmadas por cliente';
      if (labels.length === 0) { canvas.style.display = 'none'; showToast('Aún no hay clientes con compras confirmadas.', 'error'); return; }
      else canvas.style.display = 'block';
    }

    let chartType = style;
    if (style === 'area') chartType = 'line';
    const extraOptions = {};
    if (style === 'area') extraOptions.fill = true;

    currentChart = new Chart(ctx, {
      type: chartType,
      data: {
        labels,
        datasets: [{
          label: titulo,
          data,
          backgroundColor: isPieOrDoughnut ? ['#0071e3', '#30d158', '#ff9f0a', '#ff453a', '#5e5ce6', '#bf5af2', '#64d2ff', '#ffd60a'] : '#0071e3',
          borderColor: '#30d158',
          borderWidth: 1,
          ...extraOptions
        }]
      },
      options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: 'white' } } } }
    });
  }

  // ================= TABS =================
  function switchTab(tabId) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    const activeTab = document.querySelector(`.tab[data-tab="${tabId}"]`);
    if (activeTab) activeTab.classList.add('active');
    const panels = ['productosPanel', 'accesoriosPanel', 'solicitudesPanel', 'clientesPanel', 'reparacionesPanel', 'graficasPanel'];
    panels.forEach(pid => { const el = document.getElementById(pid); if (el) el.classList.add('hidden'); });
    const currentPanel = document.getElementById(`${tabId}Panel`);
    if (currentPanel) currentPanel.classList.remove('hidden');
    if (tabId === 'graficas') renderGraficas();
  }
  document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => switchTab(tab.dataset.tab)));

  // ================= LOGIN / LOGOUT =================
  document.getElementById('loginButton').onclick = async () => {
    const email = document.getElementById('adminEmail').value, pwd = document.getElementById('adminPassword').value;
    const { error } = await adminSupabase.auth.signInWithPassword({ email, password: pwd });
    if (error) showToast('Error: ' + error.message, 'error');
    else checkSession();
  };
  document.getElementById('logoutBtn').onclick = async () => { await adminSupabase.auth.signOut(); checkSession(); };
  checkSession();
</script>
</body>
</html>
