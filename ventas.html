<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ventas | DLIFE Technologies</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <nav class="navbar">
    <h2 class="logo">𝐃𝐋𝐈𝐅𝐄</h2>
    <ul class="nav-links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="ventas.html" class="active">Ventas</a></li>
      <li><a href="reparacion.html">Reparación</a></li>
      <li><a href="accesorios.html">Accesorios</a></li>
    </ul>
    <a href="https://instagram.com/tu_usuario" target="_blank" style="color:white; margin-right: 20px; font-size: 1.4rem;" data-no-fade>
      <i class="fab fa-instagram"></i>
    </a>
    <div class="menu-toggle">☰</div>
  </nav>

  <div class="sales-container">
    <div class="sales-left">
      <img id="productImage" src="" alt="Producto">
    </div>
    <div class="sales-right">
      <h1>Comprar dispositivo</h1>
      <select id="device" class="sales-select"></select>
      <select id="model" class="sales-select"></select>
      <div class="price-tag" id="productPrice">RD$0</div>
      <div class="status-badge" id="productStatus"></div>
      <button id="buyButton" class="btn primary">Comprar por WhatsApp</button>
    </div>
  </div>

  <footer class="apple-footer">
    <div class="social-links">
      <a href="https://wa.me/18292890243" target="_blank" data-no-fade><i class="fab fa-whatsapp"></i></a>
      <a href="https://instagram.com/tu_usuario" target="_blank" data-no-fade><i class="fab fa-instagram"></i></a>
    </div>
    <div class="footer-text">© 2025 DLIFE Technologies — Expertos en Apple</div>
  </footer>

  <script src="store.js"></script>
  <script src="main.js"></script>
  <script>
    const deviceSelect = document.getElementById('device');
    const modelSelect = document.getElementById('model');
    const productImage = document.getElementById('productImage');
    const productPrice = document.getElementById('productPrice');
    const productStatus = document.getElementById('productStatus');
    const buyBtn = document.getElementById('buyButton');

    function loadTypes() {
      const tipos = [...new Set(STORE.dispositivos.map(p => p.tipo))];
      deviceSelect.innerHTML = '';
      tipos.forEach(tipo => {
        const opt = document.createElement('option');
        opt.value = tipo;
        opt.textContent = tipo;
        deviceSelect.appendChild(opt);
      });
      loadModels();
    }

    function loadModels() {
      const tipo = deviceSelect.value;
      const filtered = STORE.dispositivos.filter(p => p.tipo === tipo);
      modelSelect.innerHTML = '';
      filtered.forEach(prod => {
        const opt = document.createElement('option');
        opt.value = prod.id;
        opt.textContent = `${prod.name} ${prod.stock === 0 ? '(Agotado)' : ''}`;
        modelSelect.appendChild(opt);
      });
      updateProduct();
    }

    function updateProduct() {
      const id = parseInt(modelSelect.value);
      const product = STORE.dispositivos.find(p => p.id === id);
      if (!product) return;
      productImage.src = product.image;
      productPrice.textContent = `RD$${product.price.toLocaleString()}`;
      productStatus.innerHTML = product.stock > 0 ? (product.stock > 5 ? '✅ Disponible' : '⚠️ Pocas unidades') : '❌ Agotado';
    }

    buyBtn.addEventListener('click', async () => {
      const id = parseInt(modelSelect.value);
      const product = STORE.dispositivos.find(p => p.id === id);
      if (!product || product.stock === 0) {
        showToast('Producto agotado', true);
        return;
      }
      // Pedir datos al cliente (nombre, teléfono, email) para guardar en Supabase
      const nombre = prompt('Ingresa tu nombre completo:');
      const telefono = prompt('Ingresa tu número de teléfono:');
      const emailCliente = prompt('Ingresa tu email:');
      if (!nombre || !telefono || !emailCliente) {
        showToast('Datos incompletos. No se guardó la solicitud.', true);
        return;
      }
      const orderID = generateOrderID();
      // Guardar en Supabase
      const { error } = await supabase
        .from('ventas_contactos')
        .insert([{
          producto: product.name,
          precio: product.price,
          nombre: nombre,
          telefono: telefono,
          email: emailCliente,
          orden: orderID.toString()
        }]);
      if (error) console.error('Error guardando consulta de venta:', error);
      else showToast('Consulta guardada correctamente');

      const message = `🛒 *NUEVA COMPRA - DLIFE*\n🆔 Pedido: #${orderID}\n📱 *Producto:* ${product.name}\n💰 *Precio:* RD$${product.price.toLocaleString()}\n👤 *Cliente:* ${nombre}\n📞 Tel: ${telefono}\n✉️ Email: ${emailCliente}\n\n¡Gracias por tu interés!`;
      sendToWhatsApp(message);
    });

    deviceSelect.addEventListener('change', loadModels);
    modelSelect.addEventListener('change', updateProduct);
    loadTypes();
  </script>
</body>
</html>
