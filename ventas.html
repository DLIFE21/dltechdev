<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ventas | DLIFE</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <h2 class="logo">𝐃𝐋𝐈𝐅𝐄</h2>
    <ul class="nav-links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="ventas.html" class="active">Ventas</a></li>
      <li><a href="reparacion.html">Reparación</a></li>
      <li><a href="accesorios.html">Accesorios</a></li>
    </ul>
    <div class="menu-toggle">☰</div>
  </nav>

  <div class="sales-container">
    <div class="sales-left">
      <img id="productImage" src="" alt="Producto">
    </div>
    <div class="sales-right">
      <h1>Comprar dispositivo</h1>
      <select id="device" class="sales-select"></select>
      <select id="model" class="sales-select"></select>
      <div class="price-tag" id="productPrice">RD$0</div>
      <div class="status-badge" id="productStatus"></div>
      <button id="buyButton" class="btn primary">Comprar por WhatsApp</button>
    </div>
  </div>

  <script src="store.js"></script>
  <script src="main.js"></script>
  <script>
    const deviceSelect = document.getElementById('device');
    const modelSelect = document.getElementById('model');
    const productImage = document.getElementById('productImage');
    const productPrice = document.getElementById('productPrice');
    const productStatus = document.getElementById('productStatus');

    // Cargar tipos únicos
    function loadTypes() {
      const tipos = [...new Set(STORE.dispositivos.map(p => p.tipo))];
      deviceSelect.innerHTML = '';
      tipos.forEach(tipo => {
        const opt = document.createElement('option');
        opt.value = tipo;
        opt.textContent = tipo;
        deviceSelect.appendChild(opt);
      });
      loadModels();
    }

    function loadModels() {
      const tipo = deviceSelect.value;
      const filtered = STORE.dispositivos.filter(p => p.tipo === tipo);
      modelSelect.innerHTML = '';
      filtered.forEach(prod => {
        const opt = document.createElement('option');
        opt.value = prod.id;
        opt.textContent = `${prod.name} ${prod.stock === 0 ? '(Agotado)' : ''}`;
        modelSelect.appendChild(opt);
      });
      updateProduct();
    }

    function updateProduct() {
      const id = parseInt(modelSelect.value);
      const product = STORE.dispositivos.find(p => p.id === id);
      if (!product) return;
      productImage.src = product.image;
      productPrice.textContent = `RD$${product.price.toLocaleString()}`;
      if (product.stock > 5) productStatus.innerHTML = '✅ Disponible';
      else if (product.stock > 0) productStatus.innerHTML = '⚠️ Pocas unidades';
      else productStatus.innerHTML = '❌ Agotado';
    }

    document.getElementById('buyButton').addEventListener('click', () => {
      const id = parseInt(modelSelect.value);
      const product = STORE.dispositivos.find(p => p.id === id);
      if (!product || product.stock === 0) {
        showToast('Producto agotado', true);
        return;
      }
      const orderID = generateOrderID();
      const message = `🛒 *NUEVA COMPRA - DLIFE*
Pedido: #${orderID}
*Producto:* ${product.name}
*Precio:* RD$${product.price.toLocaleString()}
*Cliente:* Solicito información y disponibilidad.

¡Gracias!`;
      sendToWhatsApp(message);
      showToast('Abriendo WhatsApp para finalizar compra');
    });

    deviceSelect.addEventListener('change', loadModels);
    modelSelect.addEventListener('change', updateProduct);
    loadTypes();
  </script>
</body>
</html>
