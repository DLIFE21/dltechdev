<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Accesorios | DLIFE Technologies</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Estilos específicos para la página de accesorios (Apple-style) */
    .accesorios-hero {
      text-align: center;
      margin: 40px 20px 20px;
    }
    .accesorios-hero h1 {
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      font-weight: 600;
      background: linear-gradient(135deg, #fff, #8e8e93);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.02em;
    }
    .accesorios-hero p {
      color: #8e8e93;
      font-size: 1.2rem;
      margin-top: 8px;
    }

    /* Grid de productos estilo Apple Store */
    .accesorios-grid {
      max-width: 1280px;
      margin: 40px auto;
      padding: 0 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 32px;
    }

    /* Card individual */
    .accessory-card {
      background: rgba(28, 28, 30, 0.6);
      backdrop-filter: blur(16px);
      border-radius: 32px;
      padding: 24px 20px 28px;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      border: 0.5px solid rgba(255,255,255,0.08);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .accessory-card:hover {
      transform: translateY(-8px);
      background: rgba(44, 44, 46, 0.8);
      box-shadow: 0 25px 40px -12px rgba(0,0,0,0.4);
    }
    .accessory-image {
      width: 100%;
      max-width: 200px;
      height: auto;
      border-radius: 24px;
      margin-bottom: 20px;
      transition: transform 0.3s ease;
    }
    .accessory-card:hover .accessory-image {
      transform: scale(1.03);
    }
    .accessory-card h3 {
      font-size: 1.4rem;
      font-weight: 590;
      margin: 12px 0 8px;
    }
    .accessory-price {
      font-size: 1.6rem;
      font-weight: 700;
      color: #30d158;
      margin: 8px 0;
    }
    .stock-badge {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 500;
      margin: 10px 0;
    }
    .stock-badge.available {
      background: rgba(48, 209, 88, 0.2);
      color: #30d158;
    }
    .stock-badge.low {
      background: rgba(255, 159, 10, 0.2);
      color: #ff9f0a;
    }
    .stock-badge.soldout {
      background: rgba(255, 69, 58, 0.2);
      color: #ff453a;
    }
    .buy-accessory-btn {
      background: #0071e3;
      border: none;
      width: 100%;
      padding: 12px;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 16px;
    }
    .buy-accessory-btn:hover {
      background: #005bb5;
      transform: scale(0.98);
    }
    .buy-accessory-btn:disabled {
      background: #555;
      cursor: not-allowed;
      transform: none;
    }
    @media (max-width: 768px) {
      .accesorios-grid {
        gap: 20px;
        padding: 0 16px;
      }
      .accessory-card {
        padding: 18px;
      }
      .accessory-price {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <h2 class="logo">𝐃𝐋𝐈𝐅𝐄</h2>
    <ul class="nav-links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="ventas.html">Ventas</a></li>
      <li><a href="reparacion.html">Reparación</a></li>
      <li><a href="accesorios.html" class="active">Accesorios</a></li>
    </ul>
    <a href="https://instagram.com/tu_usuario" target="_blank" style="color:white; margin-right: 20px; font-size: 1.4rem;" data-no-fade>
      <i class="fab fa-instagram"></i>
    </a>
    <div class="menu-toggle">☰</div>
  </nav>

  <div class="accesorios-hero">
    <h1>Accesorios originales.</h1>
    <p>Diseñados para potenciar tu experiencia Apple.</p>
  </div>

  <div id="accesoriosContainer" class="accesorios-grid">
    <!-- Las cards se generarán dinámicamente desde Supabase -->
    <div style="text-align: center; grid-column: 1/-1; padding: 40px;">Cargando accesorios...</div>
  </div>

  <footer class="apple-footer">
    <div class="social-links">
      <a href="https://wa.me/18292890243" target="_blank" data-no-fade><i class="fab fa-whatsapp"></i></a>
      <a href="https://instagram.com/tu_usuario" target="_blank" data-no-fade><i class="fab fa-instagram"></i></a>
    </div>
    <div class="footer-text">
      © 2025 DLIFE Technologies — Expertos en Apple<br>
      Síguenos en Instagram para promociones y novedades.
    </div>
  </footer>

  <script>
    // ========== SUPABASE ==========
    const SUPABASE_URL = 'https://erkethlmokmjoooucbsb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVya2V0aGxtb2ttam9vb3VjYnNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2OTc2NDAsImV4cCI6MjA5MTI3MzY0MH0.qKKJjpeLP36Oy-wyujknq3ukA7F4JodGBvAEpx74v2M';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ========== UTILIDADES ==========
    function showToast(message, isError = false) {
      let toast = document.getElementById('globalToast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'globalToast';
        toast.style.position = 'fixed';
        toast.style.bottom = '30px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = 'rgba(0,0,0,0.85)';
        toast.style.backdropFilter = 'blur(12px)';
        toast.style.padding = '12px 24px';
        toast.style.borderRadius = '40px';
        toast.style.color = 'white';
        toast.style.zIndex = '2000';
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.2s';
        toast.style.fontSize = '0.9rem';
        document.body.appendChild(toast);
      }
      toast.textContent = message;
      toast.style.opacity = '1';
      setTimeout(() => { toast.style.opacity = '0'; }, 3000);
    }

    function sendToWhatsApp(message) {
      const phone = '18292890243';
      const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
      window.open(url, '_blank');
    }

    function generateOrderID() {
      return Math.floor(10000 + Math.random() * 90000);
    }

    // ========== CARGAR ACCESORIOS DESDE SUPABASE ==========
    let accesorios = [];

    async function cargarAccesorios() {
      const container = document.getElementById('accesoriosContainer');
      container.innerHTML = '<div style="text-align: center; grid-column: 1/-1; padding: 40px;">Cargando accesorios...</div>';
      
      const { data, error } = await supabase
        .from('accesorios')
        .select('*')
        .order('id');
      
      if (error) {
        console.error(error);
        container.innerHTML = '<div style="text-align: center; grid-column: 1/-1; padding: 40px; color: #ff453a;">Error al cargar accesorios. Intenta más tarde.</div>';
        return;
      }
      
      accesorios = data || [];
      renderizarAccesorios();
    }

    function renderizarAccesorios() {
      const container = document.getElementById('accesoriosContainer');
      if (!accesorios.length) {
        container.innerHTML = '<div style="text-align: center; grid-column: 1/-1; padding: 40px;">No hay accesorios disponibles en este momento.</div>';
        return;
      }
      
      container.innerHTML = '';
      accesorios.forEach(acc => {
        const card = document.createElement('div');
        card.className = 'accessory-card';
        
        // Determinar clase de stock
        let stockClass = 'available';
        let stockText = 'Disponible';
        if (acc.stock === 0) {
          stockClass = 'soldout';
          stockText = 'Agotado';
        } else if (acc.stock <= 3) {
          stockClass = 'low';
          stockText = `¡Últimos ${acc.stock}!`;
        } else {
          stockText = 'En stock';
        }
        
        card.innerHTML = `
          <img class="accessory-image" src="${acc.imagen_url || 'https://via.placeholder.com/200?text=Sin+imagen'}" alt="${acc.nombre}">
          <h3>${acc.nombre}</h3>
          <div class="accessory-price">RD$${acc.precio.toLocaleString()}</div>
          <div class="stock-badge ${stockClass}"><i class="fas ${acc.stock === 0 ? 'fa-times-circle' : 'fa-check-circle'}"></i> ${stockText}</div>
          <button class="buy-accessory-btn" data-id="${acc.id}" ${acc.stock === 0 ? 'disabled' : ''}>
            <i class="fab fa-whatsapp"></i> Consultar por WhatsApp
          </button>
        `;
        
        const btn = card.querySelector('.buy-accessory-btn');
        if (acc.stock > 0) {
          btn.addEventListener('click', () => comprarAccesorio(acc));
        }
        
        container.appendChild(card);
      });
    }

    async function comprarAccesorio(accesorio) {
      if (accesorio.stock === 0) {
        showToast('❌ Accesorio agotado', true);
        return;
      }
      
      const nombre = prompt('👤 Ingresa tu nombre completo:');
      const telefono = prompt('📞 Ingresa tu número de teléfono:');
      const emailCliente = prompt('✉️ Ingresa tu email:');
      if (!nombre || !telefono || !emailCliente) {
        showToast('Datos incompletos. No se guardó la consulta.', true);
        return;
      }
      
      const orderID = generateOrderID();
      
      // Guardar en Supabase (tabla ventas_contactos)
      const { error } = await supabase
        .from('ventas_contactos')
        .insert([{
          producto: accesorio.nombre,
          precio: accesorio.precio,
          nombre: nombre,
          telefono: telefono,
          email: emailCliente,
          orden: orderID.toString(),
          creado_en: new Date()
        }]);
      
      if (error) {
        console.error(error);
        showToast('⚠️ Error al guardar consulta, pero puedes continuar por WhatsApp.', true);
      } else {
        showToast('✅ Consulta guardada correctamente');
      }
      
      const message = `🛍️ *DLIFE ACCESORIOS*%0A🆔 Pedido: #${orderID}%0A📦 *Producto:* ${accesorio.nombre}%0A💰 *Precio:* RD$${accesorio.precio.toLocaleString()}%0A👤 *Cliente:* ${nombre}%0A📞 Tel: ${telefono}%0A✉️ Email: ${emailCliente}%0A%0A¡Gracias por tu interés!`;
      sendToWhatsApp(message);
      showToast('📱 Abriendo WhatsApp... completa tu consulta');
    }

    // Inicializar
    cargarAccesorios();

    // Navegación con fade
    document.querySelectorAll("a").forEach(link => {
      if (link.href && !link.href.includes("#") && !link.hasAttribute('data-no-fade')) {
        link.addEventListener("click", function(e) {
          e.preventDefault();
          document.body.classList.add("fade-out");
          setTimeout(() => window.location.href = this.href, 250);
        });
      }
    });
    // Menú hamburguesa
    const toggle = document.querySelector('.menu-toggle');
    const nav = document.querySelector('.nav-links');
    if (toggle && nav) {
      toggle.addEventListener('click', () => nav.classList.toggle('active'));
    }
  </script>
</body>
</html>
