<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accesorios | DLIFE</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .accesorios-hero { text-align: center; margin: 40px 20px 20px; }
    .accesorios-hero h1 { font-size: clamp(2.2rem, 6vw, 3.5rem); background: linear-gradient(135deg,#fff,#8e8e93); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .accesorios-grid { max-width: 1280px; margin: 40px auto; padding: 0 24px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 32px; }
    .accessory-card { background: rgba(28,28,30,0.6); backdrop-filter: blur(16px); border-radius: 32px; padding: 24px; text-align: center; transition: 0.3s; }
    .accessory-card:hover { transform: translateY(-8px); background: rgba(44,44,46,0.8); }
    .accessory-image { width: 100%; max-width: 200px; border-radius: 24px; }
    .accessory-price { font-size: 1.6rem; font-weight: 700; color: #30d158; }
    .stock-badge { display: inline-block; padding: 5px 12px; border-radius: 40px; font-size: 0.7rem; }
    .stock-badge.available { background: rgba(48,209,88,0.2); color: #30d158; }
    .stock-badge.low { background: rgba(255,159,10,0.2); color: #ff9f0a; }
    .stock-badge.soldout { background: rgba(255,69,58,0.2); color: #ff453a; }
    .buy-accessory-btn { background: #0071e3; border: none; width: 100%; padding: 12px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; margin-top: 16px; }
    @media (max-width:768px){ .accesorios-grid { gap: 20px; } }

    /* Modal flotante estilo Apple */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .modal.hidden {
      display: none;
    }
    .modal-content {
      background: #1c1c1e;
      border-radius: 44px;
      padding: 32px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .modal-content h3 {
      font-size: 1.5rem;
      margin-bottom: 20px;
    }
    .modal-content input {
      width: 100%;
      padding: 14px;
      margin-bottom: 16px;
      background: #0f0f10;
      border: 1px solid #2c2c2e;
      border-radius: 28px;
      color: white;
      font-size: 1rem;
    }
    .modal-content button {
      background: #0071e3;
      border: none;
      width: 100%;
      padding: 14px;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .close-modal {
      float: right;
      font-size: 28px;
      cursor: pointer;
      color: #aaa;
      transition: color 0.2s;
    }
    .close-modal:hover {
      color: white;
    }
  </style>
</head>
<body>
  <nav class="navbar"><h2 class="logo">𝐃𝐋𝐈𝐅𝐄</h2>
    <ul class="nav-links"><li><a href="index.html">Inicio</a></li><li><a href="ventas.html">Ventas</a></li><li><a href="reparacion.html">Reparación</a></li><li><a href="accesorios.html" class="active">Accesorios</a></li></ul>
    <a href="https://instagram.com/tu_usuario" target="_blank" style="color:white; margin-right:20px; font-size:1.4rem;"><i class="fab fa-instagram"></i></a>
    <div class="menu-toggle">☰</div>
  </nav>

  <div class="accesorios-hero"><h1>Accesorios originales.</h1><p>Diseñados para potenciar tu experiencia Apple.</p></div>
  <div id="accesoriosContainer" class="accesorios-grid">Cargando...</div>

  <!-- Modal para recoger datos del cliente -->
  <div id="clienteModal" class="modal hidden">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h3><i class="fas fa-user-check"></i> Tus datos</h3>
      <input type="text" id="modalNombre" placeholder="Nombre completo" required>
      <input type="tel" id="modalTelefono" placeholder="Teléfono" required>
      <input type="email" id="modalEmail" placeholder="Email" required>
      <button id="confirmarSolicitudBtn">Enviar solicitud</button>
    </div>
  </div>

  <footer class="apple-footer">
    <div class="social-links">
      <a href="https://wa.me/18292890243" target="_blank"><i class="fab fa-whatsapp"></i></a>
      <a href="https://instagram.com/tu_usuario" target="_blank"><i class="fab fa-instagram"></i></a>
    </div>
    <div class="footer-text">© 2025 DLIFE Technologies — Expertos en Apple</div>
  </footer>

  <script>
    // VARIABLE ÚNICA PARA ACCESORIOS
    const accesoriosSupabase = window.supabase.createClient(
      'https://erkethlmokmjoooucbsb.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVya2V0aGxtb2ttam9vb3VjYnNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2OTc2NDAsImV4cCI6MjA5MTI3MzY0MH0.qKKJjpeLP36Oy-wyujknq3ukA7F4JodGBvAEpx74v2M'
    );

    let accesorios = [];
    let accesorioSeleccionado = null;

    // Modal elements
    const modal = document.getElementById('clienteModal');
    const closeModalBtn = document.querySelector('.close-modal');
    const confirmarBtn = document.getElementById('confirmarSolicitudBtn');
    const modalNombre = document.getElementById('modalNombre');
    const modalTelefono = document.getElementById('modalTelefono');
    const modalEmail = document.getElementById('modalEmail');

    function showToast(msg, isError = false) {
      let t = document.getElementById('globalToast');
      if (!t) {
        t = document.createElement('div');
        t.id = 'globalToast';
        t.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);padding:12px 24px;border-radius:40px;color:white;z-index:2000;opacity:0;transition:opacity 0.2s';
        document.body.appendChild(t);
      }
      t.textContent = msg;
      t.style.opacity = '1';
      setTimeout(() => t.style.opacity = '0', 3000);
    }

    function sendToWhatsApp(msg) {
      window.open(`https://wa.me/18292890243?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function generateOrderID() {
      return Math.floor(10000 + Math.random() * 90000);
    }

    async function cargarAccesorios() {
      const { data, error } = await accesoriosSupabase.from('accesorios').select('*').order('id');
      if (error) { console.error(error); document.getElementById('accesoriosContainer').innerHTML = '<div>Error cargando accesorios</div>'; return; }
      accesorios = data || [];
      const container = document.getElementById('accesoriosContainer');
      container.innerHTML = '';
      accesorios.forEach(acc => {
        let stockClass = 'available', stockText = 'Disponible';
        if (acc.stock === 0) { stockClass = 'soldout'; stockText = 'Agotado'; }
        else if (acc.stock <= 3) { stockClass = 'low'; stockText = `¡Últimos ${acc.stock}!`; }
        const card = document.createElement('div'); card.className = 'accessory-card';
        card.innerHTML = `<img class="accessory-image" src="${acc.imagen_url || 'https://via.placeholder.com/200?text=Sin+imagen'}"><h3>${acc.nombre}</h3><div class="accessory-price">RD$${acc.precio.toLocaleString()}</div><div class="stock-badge ${stockClass}"><i class="fas ${acc.stock === 0 ? 'fa-times-circle' : 'fa-check-circle'}"></i> ${stockText}</div><button class="buy-accessory-btn" data-id="${acc.id}" ${acc.stock === 0 ? 'disabled' : ''}><i class="fab fa-whatsapp"></i> Consultar por WhatsApp</button>`;
        const btn = card.querySelector('.buy-accessory-btn');
        if (acc.stock > 0) btn.addEventListener('click', () => {
          accesorioSeleccionado = acc;
          modal.classList.remove('hidden');
          modalNombre.value = '';
          modalTelefono.value = '';
          modalEmail.value = '';
        });
        container.appendChild(card);
      });
    }

    // Confirmar solicitud desde el modal
    confirmarBtn.addEventListener('click', async () => {
      const nombre = modalNombre.value.trim();
      const telefono = modalTelefono.value.trim();
      const emailCliente = modalEmail.value.trim();
      if (!nombre || !telefono || !emailCliente) {
        showToast('❌ Completa todos los campos', true);
        return;
      }
      if (!accesorioSeleccionado) return;

      const orderID = generateOrderID();

      // Guardar solicitud en ventas_contactos (estado 'pendiente')
      const { error } = await accesoriosSupabase.from('ventas_contactos').insert([{
        producto: accesorioSeleccionado.nombre,
        precio: accesorioSeleccionado.precio,
        nombre: nombre,
        telefono: telefono,
        email: emailCliente,
        orden: orderID.toString(),
        estado: 'pendiente',
        creado_en: new Date()
      }]);

      if (error) {
        console.error(error);
        showToast('⚠️ Error al guardar solicitud, pero puedes continuar', true);
      } else {
        showToast('✅ Solicitud enviada. En breve te contactaremos.');
      }

      // Mensaje de WhatsApp limpio y profesional
      const msg = `🛍️ *NUEVA SOLICITUD DE ACCESORIO*%0A%0A🆔 Pedido: #${orderID}%0A📦 *Producto:* ${accesorioSeleccionado.nombre}%0A💰 *Precio:* RD$${accesorioSeleccionado.precio.toLocaleString()}%0A👤 *Cliente:* ${nombre}%0A📞 Tel: ${telefono}%0A✉️ Email: ${emailCliente}%0A%0A✅ En breve recibirás confirmación.`;

      sendToWhatsApp(msg);
      modal.classList.add('hidden');
    });

    // Cerrar modal con X
    closeModalBtn.addEventListener('click', () => {
      modal.classList.add('hidden');
    });
    // Cerrar modal haciendo clic fuera
    modal.addEventListener('click', (e) => {
      if (e.target === modal) modal.classList.add('hidden');
    });

    cargarAccesorios();

    // Navegación y menú
    document.querySelectorAll('a').forEach(l => {
      if (l.href && !l.href.includes('#') && !l.hasAttribute('data-no-fade')) {
        l.addEventListener('click', e => { e.preventDefault(); document.body.classList.add('fade-out'); setTimeout(() => window.location.href = l.href, 250); });
      }
    });
    const toggle = document.querySelector('.menu-toggle'), nav = document.querySelector('.nav-links');
    if (toggle && nav) toggle.addEventListener('click', () => nav.classList.toggle('active'));
  </script>
</body>
</html>
